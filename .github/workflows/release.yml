name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v. Required when running manually.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout code 👋
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version='${{ inputs.version }}'
          if [[ -z "$version" ]]; then
            ref='${{ github.ref_name }}'
            if [[ "$ref" == v* ]]; then
              version="${ref#v}"
            fi
          fi

          if [[ -z "$version" ]]; then
            echo 'manual runs require the version input' >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Install Go 🗳
        uses: ./.github/workflows/composite/bootstrap-go
      - name: Install Protobuf 🧬
        uses: ./.github/workflows/composite/bootstrap-protobuf
      - name: Generate Code
        working-directory: ${{ github.workspace }}/src
        run: go generate ./...
      - name: Verify Generated Code
        working-directory: ${{ github.workspace }}/src
        run: |
          if ! git diff --exit-code -- .; then
            git --no-pager diff --stat
            echo "generated files are out of date"
            exit 1
          fi
      - name: Golang CI
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          working-directory: src
      - name: Fieldalignment
        working-directory: ${{ github.workspace }}/src
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          go install golang.org/x/tools/go/analysis/passes/fieldalignment/cmd/fieldalignment@latest
          go list ./... | grep -v '/daemon/ipc$' | xargs fieldalignment
      - name: Modernize
        working-directory: ${{ github.workspace }}/src
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          go install golang.org/x/tools/gopls/internal/analysis/modernize/cmd/modernize@latest
          go list ./... | grep -v '/daemon/ipc$' | xargs modernize

      - name: Run GoReleaser 🚀
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          distribution: goreleaser
          version: v2.3.2
          args: release --clean
          workdir: src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-homebrew:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Notify tap repository
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const tapRepo = process.env.HOMEBREW_TAP_REPO || `${context.repo.owner}/homebrew`;
            const [owner, repo] = tapRepo.split('/');

            if (!owner || !repo) {
              throw new Error(`invalid tap repository: ${tapRepo}`);
            }

            const version = (process.env.RELEASE_VERSION || '').replace(/^v/, '');
            if (!version) {
              throw new Error('could not determine release version');
            }

            await github.request('POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches', {
              owner,
              repo,
              workflow_id: 'release.yml',
              ref: 'main',
              inputs: { version },
            });
