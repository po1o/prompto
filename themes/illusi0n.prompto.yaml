$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
git:
    foreground: '#62c0ff'
    foreground_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#6287ff{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#7f62ff{{ end }}'
        - '{{ if gt .Ahead 0 }}#9962ff{{ end }}'
        - '{{ if gt .Behind 0 }}#c062ff{{ end }}'
    options:
        branch_template: '{{ trunc 25 .Branch }}'
        fetch_status: true
        fetch_upstream_icon: true
    style: plain
    template: '<#ff8800>on</> {{.UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
os:
    foreground: '#ff8800'
    options:
        macos: mac
    style: plain
    template: '{{ if .WSL }}WSL at {{ end }}{{.Icon}} '
path:
    foreground: '#62c0ff'
    options:
        folder_separator_icon: /
        style: full
    style: plain
prompt:
    - segments:
        - os
        - text
        - session
        - path
        - git
        - text.2
rprompt:
    - segments:
        - sysinfo
        - sysinfo.2
session:
    foreground: '#ff8800'
    style: plain
    template: '{{ .UserName }}:'
sysinfo:
    foreground: '#ff8800'
    style: diamond
    template: '{{ round .PhysicalPercentUsed .Precision }}% '
sysinfo.2:
    foreground: '#ff8800'
    style: diamond
    template: '{{ (div ((sub .PhysicalTotalMemory .PhysicalAvailableMemory)|float64) 1073741824.0) }}/{{ (div .PhysicalTotalMemory 1073741824.0) }}GB '
text:
    foreground: '#ff8800'
    style: plain
    template: $
text.2:
    foreground: '#ff8800'
    style: plain
    template: '❯ '
