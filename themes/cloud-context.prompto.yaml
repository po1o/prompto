$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
aws:
    background: p:background-color
    foreground: p:cloud-text-amazon
    powerline_symbol: ¯é┤
    style: powerline
    template: ' <p:symbol-color>´ë░</> {{.Profile}}{{if .Region}} ´üí {{.Region}}{{end}}'
az:
    background: p:background-color
    foreground: p:cloud-text-azure
    options:
        source: cli
    powerline_symbol: ¯é┤
    style: powerline
    template: ' <p:symbol-color>¯»ÿ</> {{ .Name }}'
az.2:
    background: p:background-color
    foreground: p:cloud-text-azure
    options:
        source: pwsh
    powerline_symbol: ¯é┤
    style: powerline
    template: ' <p:symbol-color>¯»ÿ</> (PS) {{ .Name }}'
console_title_template: '{{ if or .Root .Segments.Git.RepoName }}[ {{ if .Root }}Admin{{ end }}{{ if and .Root .Segments.Git.RepoName }}@{{ end }}{{ if .Segments.Git.RepoName }}{{ .Segments.Git.RepoName }}{{ end }} ]{{ end }} {{ .Folder }}'
executiontime:
    background: p:background-color
    foreground: p:timer-text
    options:
        style: austin
        threshold: 1
    powerline_symbol: ¯é┤
    style: powerline
    template: ' <p:symbol-color>¯«ó</> {{ .FormattedMs }}'
firebase:
    background: p:background-color
    foreground: p:cloud-text-firebase
    powerline_symbol: ¯é┤
    style: powerline
    template: " <p:symbol-color>\U000F0967</> {{ .Project }}"
gcp:
    background: p:background-color
    foreground: p:cloud-text-gcp
    powerline_symbol: ¯é┤
    style: powerline
    template: " <p:symbol-color>\U000F11F6</> {{ .Project }}"
git:
    background: p:background-color
    foreground: p:git-text
    powerline_symbol: ¯é┤
    style: powerline
    template: ' <p:symbol-color>´Éê</> {{ .RepoName }}'
git.2:
    background: p:background-color
    foreground: p:git-text
    options:
        fetch_status: true
    powerline_symbol: ¯é┤
    style: powerline
    template: '{{ .HEAD }}{{ if .Staging.Changed }} ´üå {{ .Staging.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }} ´üä {{ .Working.String }}{{ end }}{{ if gt .StashCount 0 }} ¯¡ï {{ .StashCount }}{{ end }} '
kubectl:
    background: p:background-color
    foreground: p:kubernetes-text
    powerline_symbol: ¯é┤
    style: powerline
    template: <p:symbol-color>´îê</> {{.Context}}{{if .Namespace}} ´üí {{.Namespace}}{{end}}
palette:
    background-color: transparent
    cloud-text-amazon: '#4285F4'
    cloud-text-azure: '#4285F4'
    cloud-text-firebase: '#FFA000'
    cloud-text-gcp: '#4285F4'
    error-background: '#dd0033'
    error-text: '#242424'
    git-text: '#238636'
    kubernetes-text: '#FFBB00'
    symbol-color: '#ffffff'
    talosctl-text: '#FF6C00'
    timer-text: '#dd0033'
path:
    background: p:background-color
    foreground: p:symbol-color
    options:
        folder_separator_icon: /
        style: folder
    powerline_symbol: ¯é┤
    style: powerline
    template: '¯ù┐ {{ path .Path .Location }} '
prompt:
    - segments:
        - time
        - kubectl
        - talosctl
        - aws
        - az
        - az.2
        - gcp
        - firebase
        - git
        - executiontime
        - status
        - status.2
    - segments:
        - time.2
        - path
        - git.2
    - segments:
        - root
        - text
root:
    background: p:error-background
    foreground: p:background-color
    leading_separator: ¯âç
    style: diamond
    template: ' ´âº '
    trailing_separator: ¯âå
status:
    background: p:background-color
    foreground: p:symbol-color
    options:
        always_enabled: true
    powerline_symbol: ¯é┤
    style: powerline
    template: '{{ if eq .Code 0 }} ´Çä {{ end }}'
status.2:
    background: p:error-background
    foreground: p:error-text
    leading_separator: ' ¯âà'
    style: diamond
    template: '{{ if ne .Code 0 }} ´Çì {{ .Code }}{{ if (ne (reason .Code) (toString .Code)) }} - {{ reason .Code }}{{else}}{{ end }} {{ end }}'
    trailing_separator: ¯âä
talosctl:
    background: p:background-color
    foreground: p:talosctl-text
    powerline_symbol: ¯é┤
    style: powerline
    template: "<p:symbol-color>\U000F10FE</> {{.Context}}"
text:
    background: p:background-color
    foreground: p:git-text
    style: plain
    template: '{{ if .Root }}{{ else }}<p:symbol-color> > </>{{ end }}'
time:
    background: p:background-color
    foreground: p:timer-text
    options:
        time_format: "15:04:05"
    powerline_symbol: ""
    style: powerline
    template: ' <p:symbol-color>¯«¬</> {{ dateInZone .Format .LastDate "UTC" }} '
time.2:
    background: p:background-color
    foreground: p:timer-text
    options:
        time_format: "15:04:05"
    powerline_symbol: ""
    style: powerline
    template: ' <p:symbol-color>´Æø</> {{ .LastDate | date .Format }} '
