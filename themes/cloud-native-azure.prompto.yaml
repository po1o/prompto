$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
az:
    background: '#9ec3f0'
    foreground: '#000000'
    powerline_symbol: ¯é░
    style: powerline
    template: ' ¯»ÿ Subscription {{ .Name }} ({{ if .EnvironmentName | contains "AzureCloud" }}{{ "Global" }}{{ else }}{{ .EnvironmentName }}{{ end }}) '
battery:
    background: '#f36943'
    background_templates:
        - '{{if eq "Charging" .State.String}}#40c4ff{{end}}'
        - '{{if eq "Discharging" .State.String}}#ff5722{{end}}'
        - '{{if eq "Full" .State.String}}#4caf50{{end}}'
    foreground: '#ffffff'
    invert_powerline: true
    options:
        charged_icon: '¯ê» '
        charging_icon: '¯¼¡ '
        discharging_icon: '´ëä '
    powerline_symbol: ¯é▓
    style: powerline
    template: ' {{ if not .Error }}{{ .Icon }}{{ .Percentage }}{{ end }}{{ .Error }}´èò '
console_title_template: '{{ .Shell }} in {{ .Folder }}'
final_space: true
git:
    background: '#fffb38'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FF9248{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff4500{{ end }}'
        - '{{ if gt .Ahead 0 }}#B388FF{{ end }}'
        - '{{ if gt .Behind 0 }}#B388FF{{ end }}'
    foreground: '#193549'
    options:
        fetch_status: true
        fetch_upstream_icon: true
    powerline_symbol: ¯é░
    style: powerline
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ´üä {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} ´üå {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} ¯¡ï {{ .StashCount }}{{ end }} '
kubectl:
    background: '#ebcc34'
    foreground: '#000000'
    leading_separator: ¯éÂ
    style: diamond
    template: ' ´îê Kubernetes {{.Context}} cluster {{if .Namespace}}- {{.Namespace}} namespace{{end}} '
    trailing_separator: ¯é░
path:
    background: '#ff479c'
    foreground: '#ffffff'
    options:
        style: folder
    powerline_symbol: ¯é░
    style: powerline
    template: ' ´ü╗  {{ .Path }} '
prompt:
    - segments:
        - session
        - path
        - git
        - status
    - segments:
        - kubectl
        - az
    - segments:
        - text
rprompt:
    - segments:
        - shell
        - battery
        - time
session:
    background: '#c386f1'
    foreground: '#ffffff'
    leading_separator: ¯éÂ
    style: diamond
    template: ' {{ if .SSHSession }}¯«® {{ end }}{{ .UserName }}@{{ .HostName }} '
    trailing_separator: ¯é░
shell:
    background: '#0077c2'
    foreground: '#ffffff'
    style: plain
    template: <#0077c2,transparent>¯éÂ</> ´Æë {{ .Name }} <transparent,#0077c2>¯é▓</>
status:
    background: '#2e9599'
    background_templates:
        - '{{ if gt .Code 0 }}#f1184c{{ end }}'
    foreground: '#ffffff'
    leading_separator: <transparent,background>¯é░</>
    options:
        always_enabled: true
    style: diamond
    template: ' ¯ê║ {{ if gt .Code 0 }}´Çì {{ reason .Code }}{{ else }}´É«{{ end }} '
    trailing_separator: ¯é┤
text:
    foreground: '#E06C75'
    style: plain
    template: ' ~ '
time:
    background: '#2e9599'
    foreground: '#111111'
    invert_powerline: true
    leading_separator: ¯é▓
    style: diamond
    template: ' ¯Öü {{ .CurrentDate | date .Format }} '
    trailing_separator: ¯é┤
version: 4
