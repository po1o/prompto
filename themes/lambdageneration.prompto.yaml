battery:
    background: '#292929'
    foreground: '#26C6DA'
    foreground_templates:
        - '{{ if eq "Full" .State.String }}#292929{{ end }}'
        - '{{ if eq "Charging" .State.String }}#40c4ff{{ end }}'
        - '{{ if eq "Discharging" .State.String }}#fb7e14{{ end }}'
    options:
        charged_icon: ' '
        charging_icon: ' '
        discharging_icon: ' '
    style: powerline
    template: ' {{ if not .Error }}{{ .Icon }}{{ .Percentage }}{{ end }}{{ .Error }} '
executiontime:
    background: '#292929'
    foreground: '#fb7e14'
    options:
        always_enabled: true
        style: austin
        threshold: 500
    style: powerline
    template: ' {{ .FormattedMs }} '
cursor_padding: true
git:
    background: '#292929'
    foreground: '#D4E157'
    style: plain
os:
    background: '#292929'
    foreground: '#fb7e14'
    leading_separator: ╭─
    style: diamond
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}} '
path:
    background: '#292929'
    foreground: '#fb7e14'
    options:
        style: full
    style: diamond
    template: ' {{ .Path }} '
    trailing_separator: 
path.2:
    background: '#fb7e14'
    foreground: '#292929'
    leading_separator: ╰─
    style: diamond
    template: 
    trailing_separator: 
prompt:
    - segments:
        - os
        - executiontime
        - root
        - path
        - git
        - battery
        - status
    - segments:
        - path.2
root:
    background: '#292929'
    foreground: '#26C6DA'
    style: plain
    template: '  '
rprompt:
    - segments:
        - session
        - time
session:
    background: '#292929'
    foreground: '#fb7e14'
    leading_separator: 
    style: diamond
    template: ' {{ if .SSHSession }} {{ end }}{{ .UserName }}@{{ .HostName }} <#fb7e14></> '
status:
    background: '#292929'
    background_templates:
        - '{{ if gt .Code 0 }}#292929{{ end }}'
    foreground: '#fb7e14'
    options:
        always_enabled: true
    style: diamond
    template: ' {{ if gt .Code 0 }} {{ reason .Code }}{{ else }}{{ end }} '
    trailing_separator: 
time:
    background: '#292929'
    foreground: '#fb7e14'
    options:
        time_format: 15:04:05, _2
    style: diamond
    template: '{{ .LastDate | date .Format }}  '
    trailing_separator: 
