$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
console_title_template: '{{if .Root}}ÔÜí {{end}}{{.Folder}}'
executiontime:
    background: '#33a3dc'
    foreground: '#fffef9'
    options:
        always_enabled: true
    powerline_symbol: ¯é░
    style: powerline
    template: ' ´üñ  {{ .FormattedMs }} '
final_space: true
git:
    background: '#fffffb'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#ffeb95{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#fcaf17{{ end }}'
        - '{{ if gt .Ahead 0 }}#95ffa4{{ end }}'
        - '{{ if gt .Behind 0 }}#f7acbc{{ end }}'
        - '{{ if .UpstreamGone }}#d1c7b7{{ end }}'
    foreground: '#100e23'
    options:
        azure_devops_icon: '¯»ÿ '
        bitbucket_icon: '´à▒ '
        branch_gone_icon: '¯»î '
        branch_icon: '¯éá '
        branch_identical_icon: '´ôä '
        commit_icon: '´Éù '
        fetch_status: true
        fetch_upstream_icon: true
        git_icon: '´çô '
        github_icon: '´Éê '
        gitlab_icon: '´èû '
        tag_icon: '´ÉÆ '
    powerline_symbol: ¯é░
    style: powerline
    template: ' {{ if( .UpstreamIcon ) }}{{ url .UpstreamIcon .UpstreamURL }} {{ end }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} <#ed1941>´üä {{.Working.String}}</>{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} <#225a1f>´üå {{.Staging.String}}</>{{ end }}{{ if gt .StashCount 0 }}  ¯¡ï {{.StashCount}}{{ end }}{{ if gt .WorktreeCount 0 }}{{if .IsWorkTree}}<#1d953f>{{ end }}  ´å╗ {{if .IsWorkTree}}</>{{ end }}{{.WorktreeCount}}{{ end }} '
os:
    background: '#C678DD'
    foreground: '#fffef9'
    options:
        windows: ´à║
    powerline_symbol: ¯é░
    style: powerline
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}} '
path:
    background: '#C678DD'
    foreground: '#fffef9'
    options:
        style: full
    powerline_symbol: ¯é░
    style: powerline
    template: '{{ path .Path .Location }} '
prompt:
    - segments:
        - text
        - session
        - os
        - path
        - git
        - executiontime
        - status
    - segments:
        - text.2
        - text.3
session:
    background: '#ffce7b'
    foreground: '#1d1626'
    powerline_symbol: ¯é░
    style: powerline
    template: ' ´ë¼  {{ if .SSHSession }}¯«®  {{ end }}{{ .UserName }}@{{ .HostName }} '
status:
    background: '#ed1941'
    foreground: '#fffef9'
    powerline_symbol: ¯é░
    style: powerline
    template: ' ´ä¬ >>{{ reason .Code }} '
text:
    foreground: '#ffce7b'
    style: plain
    template: 'Ôöî '
text.2:
    foreground: '#ffce7b'
    style: plain
    template: Ôöö
text.3:
    foreground: '#ffffff'
    style: plain
    template: ' $'
version: 4
