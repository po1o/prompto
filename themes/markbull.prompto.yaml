console_title_template: '{{if .Root}}⚡ {{end}}{{.Folder}}'
executiontime:
    background: '#33a3dc'
    foreground: '#fffef9'
    options:
        always_enabled: true
    powerline_symbol: 
    style: powerline
    template: '   {{ .FormattedMs }} '
cursor_padding: true
git:
    background: '#fffffb'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#ffeb95{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#fcaf17{{ end }}'
        - '{{ if gt .Ahead 0 }}#95ffa4{{ end }}'
        - '{{ if gt .Behind 0 }}#f7acbc{{ end }}'
        - '{{ if .UpstreamGone }}#d1c7b7{{ end }}'
    foreground: '#100e23'
    options:
        azure_devops_icon: ' '
        bitbucket_icon: ' '
        branch_gone_icon: ' '
        branch_icon: ' '
        branch_identical_icon: ' '
        commit_icon: ' '
        fetch_status: true
        fetch_upstream_icon: true
        git_icon: ' '
        github_icon: ' '
        gitlab_icon: ' '
        tag_icon: ' '
    powerline_symbol: 
    style: powerline
    template: ' {{ if( .UpstreamIcon ) }}{{ url .UpstreamIcon .UpstreamURL }} {{ end }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} <#ed1941> {{.Working.String}}</>{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} <#225a1f> {{.Staging.String}}</>{{ end }}{{ if gt .StashCount 0 }}   {{.StashCount}}{{ end }}{{ if gt .WorktreeCount 0 }}{{if .IsWorkTree}}<#1d953f>{{ end }}   {{if .IsWorkTree}}</>{{ end }}{{.WorktreeCount}}{{ end }} '
os:
    background: '#C678DD'
    foreground: '#fffef9'
    options:
        windows: 
    powerline_symbol: 
    style: powerline
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}} '
path:
    background: '#C678DD'
    foreground: '#fffef9'
    options:
        style: full
    powerline_symbol: 
    style: powerline
    template: '{{ path .Path .Location }} '
prompt:
    - segments:
        - text
        - session
        - os
        - path
        - git
        - executiontime
        - status
    - segments:
        - text.2
        - text.3
session:
    background: '#ffce7b'
    foreground: '#1d1626'
    powerline_symbol: 
    style: powerline
    template: '   {{ if .SSHSession }}  {{ end }}{{ .UserName }}@{{ .HostName }} '
status:
    background: '#ed1941'
    foreground: '#fffef9'
    powerline_symbol: 
    style: powerline
    template: '  >>{{ reason .Code }} '
text:
    foreground: '#ffce7b'
    style: plain
    template: '┌ '
text.2:
    foreground: '#ffce7b'
    style: plain
    template: └
text.3:
    foreground: '#ffffff'
    style: plain
    template: ' $'
