$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
aws:
    foreground: '#b48ead'
    style: plain
    template: <#5e81ac>--[</>{{.Profile}}{{if .Region}}@{{.Region}}{{end}}<#5e81ac>]</>
final_space: true
git:
    foreground: '#b48ead'
    options:
        fetch_status: true
        fetch_upstream_icon: true
    style: plain
    template: <#5e81ac>--[</>{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}<#8fbcbb> ● </>{{ end }}{{ if .Staging.Changed }}<#88c0d0> ● </>{{ end }}<#5e81ac>]</>
kubectl:
    foreground: '#b48ead'
    style: plain
    template: '<#5e81ac>--[</>{{.Context}}{{if .Namespace}} :: {{.Namespace}}{{end}}<#5e81ac>]</>'
path:
    foreground: '#88c0d0'
    options:
        style: full
    style: plain
    template: <#5e81ac>┖[</>{{ .Path }}<#5e81ac>]</>
prompt:
    - segments:
        - session
        - git
        - aws
        - kubectl
        - root
        - status
    - segments:
        - path
    - segments:
        - text
root:
    foreground: '#d8dee9'
    style: plain
    template: <#5e81ac>[</><#5e81ac>]</>
session:
    foreground: '#88c0d0'
    style: plain
    template: <#5e81ac>┏[</>{{ .UserName }}<#5e81ac>]</>
status:
    foreground: '#d8dee9'
    style: plain
    template: <#5e81ac>[x</>{{ reason .Code }}<#5e81ac>]</>
text:
    foreground: '#5e81ac'
    style: plain
    template: '  '
version: 4
