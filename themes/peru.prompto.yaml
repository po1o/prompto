executiontime:
    foreground: '#bab02a'
    options:
        threshold: 10
    style: plain
    template: 'took  {{ .FormattedMs }} '
git:
    foreground: '#FFE700'
    foreground_templates:
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#FFCC80{{ end }}'
        - '{{ if gt .Ahead 0 }}#16c60c{{ end }}'
        - '{{ if gt .Behind 0 }}#f450de{{ end }}'
    options:
        fetch_status: true
        fetch_upstream_icon: true
    style: plain
    template: '{{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
java:
    background: '#4c1f5e'
    foreground: '#ffffff'
    leading_separator: ' '
    style: diamond
    template: ' {{ .Full }} '
    trailing_separator: 
node:
    background: '#6CA35E'
    foreground: '#ffffff'
    leading_separator: 
    style: diamond
    template: ' {{ .Full }} '
    trailing_separator: 
os:
    foreground: '#26C6DA'
    style: plain
    template: '{{ if .WSL }}WSL at {{ end }}{{.Icon}} '
path:
    foreground: '#77E4F7'
    options:
        style: full
    style: plain
    template: '{{ .Path }} '
prompt:
    - segments:
        - os
        - session
        - python
        - git
    - segments:
        - path
        - text
python:
    foreground: '#0fc469'
    style: powerline
    template: '➜ ({{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Major }}.{{ .Minor }}{{ end }}) '
rprompt:
    - segments:
        - node
        - java
        - status
        - executiontime
        - time
session:
    foreground: '#26C6DA'
    style: diamond
    template: '{{ .UserName }}@{{ .HostName }} '
status:
    options:
        always_enabled: true
    style: plain
    template: ' {{ if gt .Code 0 }}<#ff0000></>{{ else }}<#23d18b></>{{ end }} '
text:
    foreground: '#43D426'
    style: plain
    template: '❯ '
time:
    foreground: '#00C5C7'
    options:
        time_format: "15:04:05"
    style: plain
    template: ' {{ .LastDate | date .Format }}  '
