cursor_padding: true
git:
    background: '#fee761'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#f77622{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#e43b44{{ end }}'
        - '{{ if gt .Ahead 0 }}#2ce8f5{{ end }}'
        - '{{ if gt .Behind 0 }}#f77622{{ end }}'
    foreground: '#262b44'
    options:
        fetch_status: true
        fetch_upstream_icon: true
    powerline_symbol: 
    style: powerline
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
path:
    background: '#feae34'
    foreground: '#262b44'
    leading_separator: 
    options:
        style: folder
    powerline_symbol: 
    style: diamond
    template: '  {{ .Path }} '
    trailing_separator: 
prompt:
    - segments:
        - path
        - git
        - status
status:
    background: '#0095e9'
    background_templates:
        - '{{ if gt .Code 0 }}#ff0044{{ end }}'
    foreground: '#ffffff'
    leading_separator: <transparent,background></>
    options:
        always_enabled: true
    style: diamond
    template: '  '
    trailing_separator: 
