$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
angular:
    background: '#000000'
    foreground: '#ffffff'
    powerline_symbol: ¯é░
    style: powerline
    template: ' ¯Øô {{ if .Error }}<#FE4A49>?</>{{ else }}{{ .Full }}{{ end }} '
aurelia:
    background: '#000000'
    foreground: '#ffffff'
    powerline_symbol: ¯é░
    style: powerline
    template: ' ¯Øô {{ if .Error }}<#DE1F84>?</>{{ else }}{{ .Full }}{{ end }} '
console_title_template: "{{if .Root}} ÔÜí {{end}}{{.Folder | replace \"~\" \"\U0001F3DA\" }} @ {{.HostName}}"
dotnet:
    background: '#00ffff'
    foreground: '#000000'
    powerline_symbol: ¯é░
    style: powerline
    template: ' ¯Ø┐ {{ .Full }} '
executiontime:
    background: '#29315A'
    foreground: '#ffffff'
    leading_separator: ¯âà
    options:
        style: dallas
        threshold: 0
    style: diamond
    template: '¯«ó {{ .FormattedMs }}s '
git:
    background: '#00C853'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FFEB3B{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#FFCC80{{ end }}'
        - '{{ if gt .Ahead 0 }}#B388FF{{ end }}'
        - '{{ if gt .Behind 0 }}#B388FF{{ end }}'
    foreground: '#000000'
    options:
        fetch_status: true
    powerline_symbol: ¯é░
    style: powerline
    template: ' {{ .HEAD }}{{ if .Staging.Changed }}<#FF6F00> ´üå {{ .Staging.String }}</>{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }} ´üä {{ .Working.String }}{{ end }}{{ if gt .StashCount 0 }} ¯¡ï {{ .StashCount }}{{ end }} '
node:
    background: '#000000'
    foreground: '#45bf17'
    powerline_symbol: ¯é░
    style: powerline
    template: ' ¯£ÿ {{ .Full }} '
npm:
    background: '#000000'
    foreground: '#FE4A49'
    powerline_symbol: ¯é░
    style: powerline
    template: '¯£× {{ .Full }} '
os:
    background: '#40189c'
    foreground: '#ffffff'
    leading_separator: ¯éÂ
    style: diamond
    template: '{{ if .WSL }}WSL at {{ end }}{{.Icon}} '
path:
    background: '#01579B'
    foreground: '#ffffff'
    leading_separator: <transparent,#01579B>¯é░</>
    options:
        folder_icon: '...'
        folder_separator_icon: <transparent> ¯é¢ </>
        home_icon: ¯¼å
        style: agnoster_short
    style: diamond
    template: ' {{ .Path }} '
    trailing_separator: ¯é░
prompt:
    - segments:
        - os
        - session
        - path
        - git
        - dotnet
        - angular
        - aurelia
        - node
        - npm
        - status
    - segments:
        - status.2
rprompt:
    - segments:
        - executiontime
        - time
session:
    background: '#40189c'
    foreground: '#ffffff'
    style: diamond
    template: '| {{ .UserName }}@{{ .HostName }} '
    trailing_separator: ¯é░
status:
    background: '#910000'
    foreground: '#ffffff'
    powerline_symbol: ¯é░
    style: powerline
    template: '<transparent> ´ä¬</> {{ reason .Code }} '
status.2:
    foreground: '#ffffff'
    foreground_templates:
        - '{{ if gt .Code 0 }}#ff0000{{ end }}'
    options:
        always_enabled: true
    style: plain
    template: 'ÔØ» '
time:
    background: '#29315A'
    foreground: '#3EC669'
    options:
        time_format: 15:04:05 | Monday
    style: plain
    template: '<transparent> ¯é║¯é╝ </>{{ .LastDate | date .Format }} '
