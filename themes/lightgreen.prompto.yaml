$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
aws:
    background: '#565656'
    foreground: '#faa029'
    leading_separator: оӮ¶
    style: diamond
    template: оһӯ {{.Profile}}{{if .Region}}@{{.Region}}{{end}}
    trailing_separator: 'оӮҙ '
battery:
    background: '#f36943'
    background_templates:
        - '{{if eq "Charging" .State.String}}#b8e994{{end}}'
        - '{{if eq "Discharging" .State.String}}#fff34e{{end}}'
        - '{{if eq "Full" .State.String}}#33DD2D{{end}}'
    foreground: '#262626'
    invert_powerline: true
    leading_separator: оӮІ
    options:
        charged_icon: 'пүҖ '
        charging_icon: 'пҮҰ '
        discharging_icon: 'оҲҙ '
    style: plain
    template: ' {{ if not .Error }}{{ .Icon }}{{ .Percentage }}{{ end }}{{ .Error }}пҠ• <#262626>оӮІ</>'
executiontime:
    options:
        always_enabled: true
        style: roundrock
    style: diamond
    template: '{{ .FormattedMs }} '
git:
    background: '#272727'
    foreground: '#00ff0d'
    options:
        fetch_status: true
    style: plain
    template: '<#000000>оӮұ </>{{ .HEAD }}{{ if .Staging.Changed }}<#FF6F00> пҒҶ {{ .Staging.String }}</>{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }} пҒ„ {{ .Working.String }}{{ end }}{{ if gt .StashCount 0 }} оӯӢ {{ .StashCount }}{{ end }} '
go:
    background: '#ffffff'
    foreground: '#06aad5'
    leading_separator: оӮ¶
    style: diamond
    template: оҳҰ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
kubectl:
    background: '#316ce4'
    foreground: '#ffffff'
    leading_separator: оӮ¶
    style: diamond
    template: 'пҢҲ {{.Context}}{{if .Namespace}} :: {{.Namespace}}{{end}}'
    trailing_separator: оӮҙ
os:
    background: transparent
    foreground: '#ffffff'
    options:
        alpine: пҢҖ
        arch: пҢғ
        centos: пҢ„
        debian: пҢҶ
        elementary: пҢү
        fedora: пҢҠ
        gentoo: пҢҚ
        linux: оң’
        macos: оң‘
        manjaro: пҢ’
        mint: пҢҸ
        opensuse: пҢ”
        raspbian: пҢ•
        ubuntu: пҢң
        windows: оҳӘ
    style: plain
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}} '
path:
    background: '#272727'
    foreground: '#3EC669'
    leading_separator: оӮ¶
    options:
        style: folder
    style: diamond
    template: о—ҝ {{ .Path }}
    trailing_separator: оӮҙ
prompt:
    - segments:
        - root
        - os
        - path
        - git
        - python
        - go
        - aws
        - terraform
        - kubectl
pwd: osc99
python:
    background: '#306998'
    foreground: '#FFE873'
    leading_separator: оӮ¶
    style: diamond
    template: оҲө {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
root:
    background: '#000000'
    foreground: '#dd1e1e'
    style: plain
    template: ' вҡЎ'
rprompt:
    - segments:
        - executiontime
        - sysinfo
        - battery
        - time
sysinfo:
    background: '#ffffff'
    foreground: '#3c3c3c'
    style: plain
    template: ' {{ round .PhysicalPercentUsed .Precision }}% '
terraform:
    background: '#ebcc34'
    foreground: '#000000'
    powerline_symbol: оӮ°
    style: powerline
    template: '{{.WorkspaceName}}'
time:
    background: '#000000'
    foreground: lightGreen
    style: plain
    template: '{{ .CurrentDate | date .Format }}'
version: 4
