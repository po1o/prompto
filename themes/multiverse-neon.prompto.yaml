$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
crystal:
    foreground: '#4063D8'
    options:
        display_mode: files
        fetch_version: true
    style: plain
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
git:
    background: '#29315A'
    foreground: '#43CCEA'
    foreground_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FF9248{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff4500{{ end }}'
        - '{{ if gt .Ahead 0 }}#B388FF{{ end }}'
        - '{{ if gt .Behind 0 }}#B388FF{{ end }}'
    leading_separator: ' '
    options:
        branch_template: '{{ trunc 25 .Branch }}'
        fetch_status: true
        fetch_upstream_icon: true
    style: diamond
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
    trailing_separator: 
node:
    foreground: '#88e570'
    options:
        display_mode: files
        fetch_package_manager: true
        fetch_version: true
        npm_icon: '<#e5272d> npm</> '
        pnpm_icon: "<#e5a100>\U000F02C1 pnpm</> "
        yarn_icon: '<#37aee5> yarn</> '
    style: plain
    template: '{{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }} {{ .Full }}'
path:
    background: '#29315A'
    foreground: '#3EC669'
    leading_separator: 
    options:
        style: mixed
    style: diamond
    template:  {{ .Path }}
    trailing_separator: 
prompt:
    - segments:
        - path
        - git
        - status
    - segments:
        - text
python:
    foreground: '#FED142'
    options:
        display_mode: context
        fetch_virtual_env: false
    style: plain
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
rprompt:
    - segments:
        - node
        - crystal
        - ruby
        - python
ruby:
    foreground: '#DE3F24'
    options:
        display_mode: files
        fetch_version: true
    style: plain
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
status:
    foreground: '#C94A16'
    style: plain
    template: 'x '
text:
    foreground: '#63F08C'
    style: plain
    template: '➜ '
version: 4
