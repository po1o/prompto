$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
console_title_template: '{{ .Shell }} in {{ .Folder }}'
executiontime:
    background: '#83769c'
    foreground: '#ffffff'
    options:
        always_enabled: true
    style: plain
    template: <transparent>¯é░</> ¯«ó{{ .FormattedMs }}ÔáÇ
final_space: true
git:
    background: '#fffb38'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FF9248{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff4500{{ end }}'
        - '{{ if gt .Ahead 0 }}#B388FF{{ end }}'
        - '{{ if gt .Behind 0 }}#B388FF{{ end }}'
    foreground: '#193549'
    options:
        branch_template: '{{ trunc 25 .Branch }}'
        fetch_status: true
        fetch_upstream_icon: true
    powerline_symbol: ¯é░
    style: powerline
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ´üä {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} ´üå {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} ¯¡ï {{ .StashCount }}{{ end }} '
path:
    background: '#ff479c'
    foreground: '#ffffff'
    options:
        folder_separator_icon: ' ¯é▒ '
        home_icon: "~"
        style: folder
    powerline_symbol: ¯é░
    style: powerline
    template: ' ¯¬â  {{ .Path }} '
prompt:
    - segments:
        - session
        - path
        - git
        - executiontime
        - strava
        - status
session:
    background: '#c386f1'
    foreground: '#ffffff'
    leading_separator: ¯éÂ
    style: diamond
    template: ' {{ .UserName }} '
    trailing_separator: ¯é░
status:
    background: '#00897b'
    background_templates:
        - '{{ if gt .Code 0 }}#e91e63{{ end }}'
    foreground: '#ffffff'
    options:
        always_enabled: true
    style: diamond
    template: '<parentBackground>¯é░</> ¯ê║ '
    trailing_separator: ¯é┤
strava:
    background: '#000000'
    background_templates:
        - '{{ if gt .Hours 100 }}#dc3545{{ end }}'
        - '{{ if and (lt .Hours 100) (gt .Hours 50) }}#ffc107{{ end }}'
        - '{{ if lt .Hours 50 }}#28a745{{ end }}'
    foreground: '#ffffff'
    foreground_templates:
        - '{{ if gt .Hours 100 }}#FFFFFF{{ end }}'
        - '{{ if and (lt .Hours 100) (gt .Hours 50) }}#343a40{{ end }}'
        - '{{ if lt .Hours 50 }}#FFFFFF{{ end }}'
    options:
        access_token: 0ccbd2ac1e37a5b84101468df3d367177fe02ab3
        http_timeout: 1500
        refresh_token: "111111111111111111111111111111"
    style: powerline
    template: ' {{.Name}} {{.Ago}} {{.Icon}} '
version: 4
