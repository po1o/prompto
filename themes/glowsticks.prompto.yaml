blocks:
    - alignment: left
      segments:
        - background: p:black
          foreground: p:white
          invert_powerline: true
          powerline_symbol: о‚¶
          style: powerline
          template: '{{ .UserName }}@{{ .HostName }} '
          type: session
        - background: p:orange
          foreground: p:white
          options:
            home_icon: пЂ•
            style: folder
          powerline_symbol: о‚°
          style: powerline
          template: ' пЃ» {{ .Path }} '
          type: path
        - background: p:darkred
          foreground: p:white
          options:
            always_enabled: true
            style: round
          powerline_symbol: о‚°
          style: powerline
          template: " \U000F051F{{ .FormattedMs }} "
          type: executiontime
        - background: p:blue
          background_templates:
            - '{{ if gt .Code 0 }}p:red{{ end }}'
          foreground: p:white
          options:
            always_enabled: true
          powerline_symbol: о‚°
          style: diamond
          template: ' {{ if gt .Code 0 }}пЂЌ {{ reason .Code }}{{ else }}пЂЊ{{ end }} '
          trailing_diamond: о‚ґ
          type: status
      type: prompt
    - alignment: right
      segments:
        - background: p:black
          foreground: p:white
          style: plain
          template: <p:black,transparent>о‚¶</>п„  {{ .Name }}<transparent,p:black>о‚І</>
          type: shell
        - background_templates:
            - '{{if eq "Charging" .State.String }}p:green{{end}}'
            - '{{if eq "Discharging" .State.String}}p:orange{{end}}'
          foreground: p:white
          leading_diamond: о‚І
          options:
            charged_icon: "\U000F0084"
            charging_icon: "\U000F0084"
            discharging_icon: "\U000F0079 "
          style: diamond
          template: " {{.Templates }}{{ .Percentage}}\U000F03F0 <transparent>о‚І</>"
          templates:
            - "{{if eq \"Discharging\" .State.String}}{{if lt .Percentage 11}}\U000F007A{{else if lt .Percentage 21}}\U000F007B{{else if lt .Percentage 31}}\U000F007C{{else if lt .Percentage 41}}\U000F007D{{else if lt .Percentage 51}}\U000F007E{{else if lt .Percentage 61}}\U000F007E{{else if lt .Percentage 71}}\U000F0080{{else if lt .Percentage 81}}\U000F0081{{else if lt .Percentage 91}}\U000F0082{{else}}\U000F0079{{end}}{{end}}"
            - "{{if eq \"Charging\" .State.String}}{{ if lt .Percentage 21}}\U000F0086{{else if lt .Percentage 31}}\U000F0087{{else if lt .Percentage 41}}\U000F0088{{else if lt .Percentage 61}}\U000F0089{{else if lt .Percentage 81}}\U000F008A{{else if lt .Percentage 91}}\U000F008B{{else}}\U000F0084{{end}}{{end}}"
          templates_logic: first_match
          type: battery
      type: rprompt
console_title_template: п„  {{ .Shell }} in {{ if ne .Folder "~"}}пЃ» {{ .Folder }}{{else}}пЂ•{{end}}
cursor_padding: true
palette:
    black: '#33395b'
    blue: '#359ddd'
    darkred: '#7c0a16'
    green: '#277b48'
    orange: '#ff972e'
    red: '#de3142'
    white: '#efeef4'
secondary:
    - segments:
        - text.secondary
transient:
    - segments:
        - text.transient
text.secondary:
    foreground: p:white
    style: plain
    template: 'пЃЎ '
text.transient:
    foreground: p:white
    style: plain
    template: 'пЃЎ '
