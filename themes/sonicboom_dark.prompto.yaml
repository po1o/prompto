$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
executiontime:
    background: '#272727'
    foreground: '#ffffff'
    options:
        style: dallas
        threshold: 0
    style: diamond
    template: '<#000000>оӮұ </>{{ .FormattedMs }}s '
    trailing_separator: оӮ°
final_space: true
git:
    background: '#272727'
    foreground: '#00ff0d'
    options:
        fetch_status: true
    style: plain
    template: '<#000000>оӮұ </>{{ .HEAD }}{{ if .Staging.Changed }}<#FF6F00> пҒҶ {{ .Staging.String }}</>{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }} пҒ„ {{ .Working.String }}{{ end }}{{ if gt .StashCount 0 }} оӯӢ {{ .StashCount }}{{ end }} '
os:
    background: '#000000'
    foreground: '#ffffff'
    options:
        alpine: пҢҖ
        arch: пҢғ
        centos: пҢ„
        debian: пҢҶ
        elementary: пҢү
        fedora: пҢҠ
        gentoo: пҢҚ
        linux: оң’
        macos: оң‘
        manjaro: пҢ’
        mint: пҢҸ
        opensuse: пҢ”
        raspbian: пҢ•
        ubuntu: пҢң
        windows: оҳӘ
    style: plain
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}} '
path:
    background: '#272727'
    foreground: '#43CCEA'
    options:
        folder_icon: о—ҫ
        folder_separator_icon: ' <#000000>оӮҪ </>'
        home_icon: о¬Ҷ
        style: agnoster_short
    style: plain
    template: ' {{ .Path }} '
prompt:
    - segments:
        - root
        - os
        - path
        - git
        - executiontime
    - segments:
        - status
root:
    background: '#000000'
    foreground: '#dd1e1e'
    style: plain
    template: ' вҡЎ'
rprompt:
    - segments:
        - session
        - time
session:
    background: '#272727'
    foreground: '#43CCEA'
    leading_separator: оғ…
    style: diamond
    template: ' {{ if .SSHSession }}о®© {{ end }}{{ .UserName }}<transparent> / </>{{ .HostName }}'
status:
    foreground: '#00ff0d'
    foreground_templates:
        - '{{ if gt .Code 0 }}#ff0000{{ end }}'
    options:
        always_enabled: true
    style: plain
    template: 'пҗІ '
time:
    background: '#272727'
    foreground: '#43CCEA'
    options:
        time_format: 3:04:05 PM
    style: diamond
    template: '<#000000> оҢһпғ» </>{{ .CurrentDate | date .Format }} '
    trailing_separator: оғ…
version: 4
