cursor_padding: true
git:
    background: '#fffb38'
    foreground: '#193549'
    options:
        fetch_upstream_icon: true
    powerline_symbol: 
    style: powerline
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
node:
    background: '#6CA35E'
    foreground: '#ffffff'
    powerline_symbol: 
    style: powerline
    template: '  {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }} '
path:
    background: '#ff0000'
    foreground: '#000000'
    options:
        style: folder
    powerline_symbol: 
    style: powerline
    template: '  {{ .Path }} '
prompt:
    - segments:
        - session
        - spotify
        - path
        - git
        - node
        - shell
        - root
        - status
root:
    background: '#ffff66'
    foreground: '#ffffff'
    powerline_symbol: 
    style: powerline
    template: '  '
session:
    background: '#333333'
    foreground: '#ff0000'
    leading_separator: 
    style: diamond
    template: ' {{ .UserName }}@{{ .HostName }} '
    trailing_separator: 
shell:
    background: '#203248'
    foreground: '#ffffff'
    powerline_symbol: 
    style: powerline
    template: '  {{ .Name }} '
spotify:
    background: '#1BD760'
    foreground: '#434343'
    powerline_symbol: 
    style: powerline
    template: '  {{ .Icon }}{{ if ne .Status "stopped" }}{{ .Artist }} - {{ .Track }}{{ end }} '
status:
    background: '#2e9599'
    background_templates:
        - '{{ if gt .Code 0 }}#f1184c{{ end }}'
    foreground: '#ffffff'
    options:
        always_enabled: true
    style: plain
    template: <transparent></>  <background,transparent></>
