$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
console_title_template: '{{if .Root}}root :: {{end}}{{.Shell}} :: {{.Folder}}'
dotnet:
    background: '#2f2f2f'
    foreground: '#3891A6'
    style: diamond
    template: ' оқҝ {{ if .Unsupported }}пҒұ{{ else }}{{ .Full }}{{ end }}<#7a7a7a> оӮі</>'
executiontime:
    foreground: '#FFCE5C'
    options:
        style: roundrock
        threshold: 500
    style: plain
    template: ' {{ .FormattedMs }}<#fafafa> пү’ </>'
final_space: true
git:
    background: '#2f2f2f'
    foreground: '#ffeb3b'
    foreground_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#ffeb3b{{ end }}'
        - '{{ if gt .Ahead 0 }}#2EC4B6{{ end }}'
        - '{{ if gt .Behind 0 }}#8A4FFF{{ end }}'
    options:
        fetch_status: true
        fetch_upstream_icon: true
    style: diamond
    template: '<#7a7a7a>оӮұ </>{{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}<#E84855> пҒ„ {{ .Working.String }}</>{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}<#2FDA4E> пҒҶ {{ .Staging.String }}</>{{ end }}{{ if gt .StashCount 0 }} оӯӢ {{ .StashCount }}{{ end }} '
node:
    background: '#2f2f2f'
    foreground: '#6CA35E'
    style: diamond
    template: ' оңҳ {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}<#7a7a7a> оӮі</>'
os:
    background: '#2f2f2f'
    foreground: '#26C6DA'
    leading_separator: оғҮв–“
    options:
        alpine: пҢҖ
        arch: пҢғ
        centos: пҢ„
        debian: пҢҶ
        elementary: пҢү
        fedora: пҢҠ
        gentoo: пҢҚ
        linux: оң’
        macos: оң‘
        manjaro: пҢ’
        mint: пҢҸ
        opensuse: пҢ”
        raspbian: пҢ•
        ubuntu: пҢң
        windows: оңҸ
    style: diamond
    template: ' {{ if .WSL }}оң’ on {{ end }}{{ .Icon }}<#7a7a7a> оӮұ</>'
path:
    background: '#2f2f2f'
    foreground: '#fafafa'
    options:
        folder_icon: <#B5B2C2>о—ҫ </>
        style: full
    style: diamond
    template: '<#f2f200> о—ҝ </>{{ .Path }} '
prompt:
    - segments:
        - os
        - session
        - root
        - path
        - git
        - text
    - segments:
        - text.3
python:
    background: '#2f2f2f'
    foreground: '#96E072'
    style: diamond
    template: ' оҲө {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}<#7a7a7a> оӮі</>'
root:
    background: '#2f2f2f'
    foreground: '#ffff66'
    style: diamond
    template: ' пғ§<#7a7a7a> оӮұ</>'
rprompt:
    - segments:
        - text.2
        - node
        - python
        - dotnet
        - time
    - segments:
        - text.4
        - executiontime
        - status
session:
    background: '#2f2f2f'
    foreground: '#fafafa'
    style: diamond
    template: ' {{ if ne .Env.PROMPTO_SESSION_DEFAULT_USER .UserName }}<#77f5d6>{{ .UserName }}</><#7a7a7a>пҮә</>{{ end }}<#2EEFBF>{{ .HostName }}</><#7a7a7a> оӮұ</>'
status:
    foreground: '#9FD356'
    foreground_templates:
        - '{{ if gt .Code 0 }}#E84855{{ end }}'
    options:
        always_enabled: true
    style: plain
    template: ' оӘҹ {{ if gt .Code 0 }}{{ .Code }}{{ end }} '
text:
    background: '#2f2f2f'
    foreground: '#fafafa'
    style: diamond
    trailing_separator: оӮ°
text.2:
    background: '#2f2f2f'
    foreground: '#fafafa'
    leading_separator: оӮІ
    style: diamond
text.3:
    foreground: '#7a7a7a'
    style: plain
    template: ' ~#@вқҜ '
text.4:
    foreground: '#7a7a7a'
    style: plain
    template: ' вқ® '
time:
    background: '#2f2f2f'
    foreground: '#fafafa'
    options:
        time_format: "15:04:05"
    style: diamond
    template: ' {{ .CurrentDate | date .Format }}<#007ACC> оҷҒ </>'
    trailing_separator: в–“оғҶ
transient:
    - segments:
        - text.transient
text.transient:
    background: transparent
    foreground: '#7a7a7a'
    template: ' ~#@вқҜ '
version: 4
