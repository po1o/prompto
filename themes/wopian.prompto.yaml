$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
crystal:
    foreground: '#4063D8'
    options:
        display_mode: files
        fetch_version: true
    style: plain
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
git:
    foreground: lightYellow
    style: plain
    template: ':: <lightBlue>git(</>{{ .HEAD }}<lightBlue>)</>'
node:
    foreground: '#68a063'
    options:
        display_mode: files
        fetch_package_manager: true
        fetch_version: true
        npm_icon: /npm
        yarn_icon: /yarn
    style: plain
    template: ' {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}'
os:
    foreground: cyan
    style: powerline
    template: '{{ .Icon }}'
path:
    foreground: cyan
    options:
        style: full
    style: plain
    template: ' {{ .Path }} '
prompt:
    - segments:
        - os
        - path
        - git
    - segments:
        - status
python:
    foreground: '#FED142'
    options:
        display_mode: context
        fetch_virtual_env: false
    style: plain
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
rprompt:
    - segments:
        - node
        - crystal
        - ruby
        - python
        - time
ruby:
    foreground: '#DE3F24'
    options:
        display_mode: files
        fetch_version: true
    style: plain
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
status:
    foreground: lightGreen
    foreground_templates:
        - '{{ if gt .Code 0 }}red{{ end }}'
    options:
        always_enabled: true
    style: powerline
    template: '➜ '
time:
    foreground: lightGreen
    style: plain
    template: ' {{ .CurrentDate | date .Format }} '
