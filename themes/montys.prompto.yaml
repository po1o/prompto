$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
executiontime:
    background: '#83769c'
    foreground: '#ffffff'
    options:
        always_enabled: true
    powerline_symbol: 
    style: powerline
    template: '  {{ .FormattedMs }} '
cursor_padding: true
git:
    background: '#FCA17D'
    foreground: '#ffffff'
    options:
        branch_icon: ' <#ffffff> </>'
        fetch_status: false
        fetch_upstream_icon: true
    powerline_symbol: 
    style: powerline
    template: ' ➜ ({{ .UpstreamIcon }}{{ .HEAD }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }}) '
node:
    background: '#76b367'
    foreground: '#ffffff'
    powerline_symbol: 
    style: powerline
    template: '  {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }} '
os:
    background: '#003543'
    foreground: '#00c983'
    leading_separator: 
    style: diamond
    template: '{{ .Icon }} {{ .HostName }} '
path:
    background: '#DA627D'
    foreground: '#ffffff'
    options:
        folder_icon: 
        folder_separator_icon: \
        home_icon: 
        style: full
    powerline_symbol: 
    style: powerline
    template: ' <#000> </> {{ .Path }} '
prompt:
    - segments:
        - os
        - path
        - git
        - node
        - executiontime
        - time
        - status
    - segments:
        - root
        - text
root:
    foreground: '#cd5e42'
    style: plain
    template: ' '
status:
    background: '#2e9599'
    background_templates:
        - '{{ if gt .Code 0 }}red{{ end }}'
    foreground: '#ffffff'
    options:
        always_enabled: true
    powerline_symbol: 
    style: diamond
    template: ' {{ if gt .Code 0 }}{{ else }}{{ end }} '
    trailing_separator: 
text:
    foreground: '#CD4277'
    style: plain
    template: ' <#45F1C2><b>⚡</b></><b>{{ .UserName }}</b> <#26C6DA>❯</><#45F1C2>❯</>'
time:
    background: '#33658A'
    foreground: '#ffffff'
    options:
        time_format: 3:04 PM
    powerline_symbol: 
    style: powerline
    template: '  {{ .LastDate | date .Format }} '
