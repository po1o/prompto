$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
final_space: true
git:
    background: p:lavender
    foreground: p:text
    options:
        branch_icon: ' '
        cherry_pick_icon: ' '
        commit_icon: ' '
        fetch_status: false
        fetch_upstream_icon: false
        merge_icon: ' '
        no_commits_icon: ' '
        rebase_icon: ' '
        revert_icon: ' '
        tag_icon: ' '
    powerline_symbol: 
    style: powerline
    template: ' {{ .HEAD }}'
os:
    background: p:blue
    foreground: p:wight
    leading_separator: 
    powerline_symbol: 
    style: diamond
    template: '{{.Icon}} '
palette:
    blue: '#8AADF4'
    lavender: '#B7BDF8'
    os: '#ACB0BE'
    pink: '#F5BDE6'
    text: '#494D64'
    wight: '#FFFFFF'
path:
    background: p:pink
    foreground: p:text
    options:
        folder_icon: ....
        home_icon: "~"
        style: agnoster_short
    powerline_symbol: 
    style: powerline
    template: ' {{ .Path }}'
prompt:
    - segments:
        - os
        - session
        - path
        - git
session:
    background: p:blue
    foreground: p:text
    powerline_symbol: 
    style: diamond
    template: '{{ .UserName }}@{{ .HostName }}'
version: 4
