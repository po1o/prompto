$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
console_title_template: '{{if .Root}}[root] {{end}}{{.Shell}} in <{{.Folder}}>'
executiontime:
    background: transparent
    foreground: '#b3ffde'
    options:
        style: austin
        threshold: 0
    style: plain
    template: '{{.FormattedMs}}'
cursor_padding: true
git:
    background: '#ffffd6'
    foreground: p:black
    options:
        branch_icon: '  '
    style: plain
    template: '{{.HEAD}}⠀'
os:
    background: '#464646'
    foreground: p:white
    options:
        linux: 
        macos: 
        ubuntu: 
        windows: 
    style: plain
    template: ' {{.Icon}}{{if .WSL}} (WSL){{end}}⠀'
palette:
    black: '#111111'
    white: '#f7f7f7'
path:
    background: transparent
    foreground: p:white
    options:
        folder_icon: 
        folder_separator_template: <#93d0ff> » </>
        home_icon: 
        style: agnoster
    style: plain
    template: <p:white>└</><#93d0ff>[</> {{.Path}} <#93d0ff>]</>
prompt:
    - segments:
        - text
        - os
        - shell
        - session
        - git
    - segments:
        - path
    - segments:
        - status
rprompt:
    - segments:
        - executiontime
        - time
session:
    background: '#ffe093'
    foreground: p:black
    style: plain
    template: '  {{.HostName}}{{.UserName}}⠀'
shell:
    background: p:white
    foreground: p:black
    style: plain
    template: '  {{.Name}}⠀'
status:
    background: transparent
    foreground: '#81ff91'
    foreground_templates:
        - '{{if gt .Code 0}}#ff3030{{end}}'
    options:
        always_enabled: true
    style: plain
    template: ❯
text:
    background: transparent
    foreground: p:white
    style: plain
    template: ┌
time:
    background: transparent
    foreground: '#b3ffde'
    options:
        time_format: 02/01/06 15:04
    style: plain
    template: <p:white> · </>{{.LastDate | date .Format}}
