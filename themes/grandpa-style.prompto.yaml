$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
console_title_template: "{{if .Root}} вљЎ {{end}}{{.Folder | replace \"~\" \"\U0001F3DA\" }} @ {{.HostName}}"
executiontime:
    background: '#2ba1bb'
    foreground: '#5a3d29'
    leading_separator: <parentBackground,background>о‚°</>
    options:
        style: dallas
        threshold: 0
    style: diamond
    template: ' {{ .FormattedMs }}s '
git:
    background: '#00C853'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FFEB3B{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#FFCC80{{ end }}'
        - '{{ if gt .Ahead 0 }}#B388FF{{ end }}'
        - '{{ if gt .Behind 0 }}#B388FF{{ end }}'
    foreground: '#000000'
    leading_separator: <parentBackground,background>о‚°</>
    options:
        fetch_status: true
    style: diamond
    template: ' {{ .HEAD }}{{ if .Staging.Changed }}<#FF6F00> пЃ† {{ .Staging.String }}</>{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }} пЃ„ {{ .Working.String }}{{ end }}{{ if gt .StashCount 0 }} о­‹ {{ .StashCount }}{{ end }} '
os:
    background: transparent
    foreground: '#ffffff'
    style: plain
    template: '{{ if .WSL }}WSL at {{ end }}{{.Icon}} '
path:
    background: '#5a3d29'
    foreground: '#43CCEA'
    options:
        folder_icon: '...'
        folder_separator_icon: <transparent> о‚Ѕ </>
        home_icon: о¬†
        style: agnoster_short
    style: plain
    template: ' {{ .Path }} '
prompt:
    - segments:
        - root
        - os
        - path
        - git
        - executiontime
        - status
    - segments:
        - status.2
root:
    background: '#000000'
    foreground: '#dd1e1e'
    style: plain
    template: ' вљЎ '
rprompt:
    - segments:
        - session
        - time
session:
    background: '#5a3d29'
    foreground: '#43CCEA'
    leading_separator: оѓ…
    style: diamond
    template: '  {{ if .SSHSession }}о®© {{ end }}{{ .UserName }}<transparent> / </>{{ .HostName }}'
status:
    background: '#910000'
    foreground: '#ffffff'
    options:
        always_enabled: true
    powerline_symbol: о‚°
    style: plain
    template: '{{ if gt .Code 0 }}<parentBackground,background>о‚°</><transparent> п„Є</> {{ reason .Code }} <background,transparent>о‚°</>{{ else }}<parentBackground,transparent>о‚°</>{{ end }}'
status.2:
    foreground: '#ffffff'
    foreground_templates:
        - '{{ if gt .Code 0 }}#ff0000{{ end }}'
    options:
        always_enabled: true
    style: plain
    template: 'вќЇ '
time:
    background: '#5a3d29'
    foreground: '#43CCEA'
    options:
        time_format: 3:04:05 PM
    style: plain
    template: '<transparent> о‚єо‚ј </>{{ .CurrentDate | date .Format }} '
