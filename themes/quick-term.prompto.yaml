$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
executiontime:
    background: '#e4e4e4'
    foreground: '#585858'
    invert_powerline: true
    options:
        always_enabled: true
        style: austin
    powerline_symbol: Óā≤
    style: powerline
    template: ' ÓģĘ {{ .FormattedMs }} '
cursor_padding: true
git:
    background: '#378504'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#a97400{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#54433a{{ end }}'
        - '{{ if gt .Ahead 0 }}#744d89{{ end }}'
        - '{{ if gt .Behind 0 }}#744d89{{ end }}'
    foreground: '#f2f3f8'
    leading_separator: <transparent,background>Óāį</>
    options:
        branch_gone_icon: Ó™ł
        branch_icon: 'Ôźė '
        branch_identical_icon: ÔĎĄ
        branch_template: '{{ trunc 25 .Branch }}'
        fetch_status: true
    style: diamond
    template: ' {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} <transparent>ÓāĪ</> <#121318>ÔĀĄ {{ .Working.String }}</>{{ end }}{{ if .Staging.Changed }} <transparent>ÓāĪ</> <#121318>ÔĀÜ {{ .Staging.String }}</>{{ end }}{{ if gt .StashCount 0 }} <transparent>ÓāĪ</> <#121318>Ó≠č {{ .StashCount }}</>{{ end }} '
    trailing_separator: Óāį
os:
    background: '#d75f00'
    foreground: '#f2f3f8'
    leading_separator: ‚ē≠‚ĒÄÓā≤
    options:
        alpine: ÔĆÄ
        arch: ÔĆÉ
        centos: ÔĆĄ
        debian: ÔĆÜ
        elementary: ÔĆČ
        fedora: ÔĆä
        gentoo: ÔĆć
        linux: Óúí
        macos: ÓúĎ
        manjaro: ÔĆí
        mint: ÔĆŹ
        opensuse: ÔĆĒ
        raspbian: ÔĆē
        ubuntu: ÔĆú
        windows: ÓúŹ
    style: diamond
    template: ' {{ .Icon }} '
path:
    background: '#0087af'
    foreground: '#f2f3f8'
    options:
        folder_icon: ‚Ä¶
        folder_separator_icon: ' <transparent>ÓāĪ</> '
        max_depth: 3
        style: agnoster_short
    powerline_symbol: Óāį
    style: powerline
    template: ' {{ .Path }} '
prompt:
    - segments:
        - os
        - session
        - path
        - git
    - segments:
        - text
rprompt:
    - segments:
        - executiontime
        - time
session:
    background: '#e4e4e4'
    foreground: '#4e4e4e'
    powerline_symbol: Óāį
    style: powerline
    template: ' {{ .UserName }} '
text:
    foreground: '#d75f00'
    style: plain
    template: ‚ēį‚ĒÄ {{ if .Root }}#{{else}}${{end}}
time:
    background: '#d75f00'
    foreground: '#f2f3f8'
    invert_powerline: true
    options:
        time_format: "15:04:05"
    style: diamond
    template: ' ÔĀ≥ {{ .CurrentDate | date .Format }} '
    trailing_separator: Óāį
