$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
executiontime:
    background: '#e4e4e4'
    foreground: '#585858'
    invert_powerline: true
    options:
        always_enabled: true
        style: austin
    powerline_symbol: оӮІ
    style: powerline
    template: ' о®ў {{ .FormattedMs }} '
cursor_padding: true
git:
    background: '#378504'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#a97400{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#54433a{{ end }}'
        - '{{ if gt .Ahead 0 }}#744d89{{ end }}'
        - '{{ if gt .Behind 0 }}#744d89{{ end }}'
    foreground: '#f2f3f8'
    leading_separator: <transparent,background>оӮ°</>
    options:
        branch_gone_icon: оӘё
        branch_icon: 'пҗҳ '
        branch_identical_icon: п‘„
        branch_template: '{{ trunc 25 .Branch }}'
        fetch_status: true
    style: diamond
    template: ' {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} <transparent>оӮұ</> <#121318>пҒ„ {{ .Working.String }}</>{{ end }}{{ if .Staging.Changed }} <transparent>оӮұ</> <#121318>пҒҶ {{ .Staging.String }}</>{{ end }}{{ if gt .StashCount 0 }} <transparent>оӮұ</> <#121318>оӯӢ {{ .StashCount }}</>{{ end }} '
    trailing_separator: оӮ°
os:
    background: '#d75f00'
    foreground: '#f2f3f8'
    leading_separator: в•ӯв”ҖоӮІ
    options:
        alpine: пҢҖ
        arch: пҢғ
        centos: пҢ„
        debian: пҢҶ
        elementary: пҢү
        fedora: пҢҠ
        gentoo: пҢҚ
        linux: оң’
        macos: оң‘
        manjaro: пҢ’
        mint: пҢҸ
        opensuse: пҢ”
        raspbian: пҢ•
        ubuntu: пҢң
        windows: оңҸ
    style: diamond
    template: ' {{ .Icon }} '
path:
    background: '#0087af'
    foreground: '#f2f3f8'
    options:
        folder_icon: вҖҰ
        folder_separator_icon: ' <transparent>оӮұ</> '
        max_depth: 3
        style: agnoster_short
    powerline_symbol: оӮ°
    style: powerline
    template: ' {{ .Path }} '
prompt:
    - segments:
        - os
        - session
        - path
        - git
    - segments:
        - text
rprompt:
    - segments:
        - executiontime
        - time
session:
    background: '#e4e4e4'
    foreground: '#4e4e4e'
    powerline_symbol: оӮ°
    style: powerline
    template: ' {{ .UserName }} '
text:
    foreground: '#d75f00'
    style: plain
    template: в•°в”Җ {{ if .Root }}#{{else}}${{end}}
time:
    background: '#d75f00'
    foreground: '#f2f3f8'
    invert_powerline: true
    options:
        time_format: "15:04:05"
    style: diamond
    template: ' пҒі {{ .LastDate | date .Format }} '
    trailing_separator: оӮ°
