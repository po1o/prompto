$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
executiontime:
    background: '#cecece'
    foreground: '#4b4b4b'
    leading_separator: Óā≤
    options:
        style: austin
        threshold: 150
    style: diamond
    template: '‚Ćõ  {{ .FormattedMs }} '
    trailing_separator: Óāį
cursor_padding: true
git:
    background: '#191f48'
    foreground: '#43CCEA'
    foreground_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FF9248{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff4500{{ end }}'
        - '{{ if gt .Ahead 0 }}#B388FF{{ end }}'
        - '{{ if gt .Behind 0 }}#B388FF{{ end }}'
    options:
        branch_template: '{{ trunc 25 .Branch }}'
        fetch_status: true
        fetch_upstream_icon: true
    powerline_symbol: Óāį
    style: diamond
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ÔĀĄ {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} ÔĀÜ {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} Ó≠č {{ .StashCount }}{{ end }} '
    trailing_separator: Óāī
node:
    foreground: '#81ff91'
    options:
        fetch_version: true
    style: powerline
    template: <#cc7eda> | </><#7eb8da>Óúė</> {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}
npm:
    foreground: '#81ff91'
    style: powerline
    template: <#cc7eda> | </><#7eb8da>Óúě </> {{ .Full }}
os:
    background: '#0c7bbb'
    foreground: '#ffffff'
    leading_separator: ‚ē≠‚ĒÄÓā≤
    options:
        alpine: ÔĆÄ
        arch: ÔĆÉ
        centos: ÔĆĄ
        debian: ÔĆÜ
        elementary: ÔĆČ
        fedora: ÔĆä
        gentoo: ÔĆć
        linux: Óúí
        macos: ÓúĎ
        manjaro: ÔĆí
        mint: ÔĆŹ
        opensuse: ÔĆĒ
        raspbian: ÔĆē
        ubuntu: ÔĆú
        windows: ÓúŹ
    style: diamond
    template: ' {{ if .WSL }}Óúí on {{ end }}{{ .Icon }}  '
path:
    background: '#8a62da'
    foreground: '#ffffff'
    options:
        style: folder
    powerline_symbol: Óāį
    style: powerline
    template: ' {{ .Path }} '
php:
    foreground: '#81ff91'
    style: powerline
    template: <#cc7eda> | </><#7eb8da>ÓúĹ</> {{ .Full }}
prompt:
    - segments:
        - os
        - text
        - path
        - git
    - segments:
        - text.2
rprompt:
    - segments:
        - sysinfo
        - node
        - php
        - npm
        - sysinfo.2
        - executiontime
        - time
sysinfo:
    foreground: '#81ff91'
    style: diamond
    template: <#cc7eda> | </><#7eb8da>RAM:</> {{ (div ((sub .PhysicalTotalMemory .PhysicalAvailableMemory)|float64) 1073741824.0) }}/{{ (div .PhysicalTotalMemory 1073741824.0) }}GB
sysinfo.2:
    foreground: '#81ff91'
    style: powerline
    template: <> </>
text:
    background: '#DA627D'
    foreground: '#ffffff'
    powerline_symbol: Óāį
    style: diamond
    template: " \U0001F3E0  "
text.2:
    foreground: '#0c7bbb'
    style: plain
    template: ‚ēį‚ĒÄ
time:
    background: '#cecece'
    foreground: '#4b4b4b'
    leading_separator: Óā≤
    options:
        time_format: "15:04:05"
    style: diamond
    template: '‚Źį  {{ .CurrentDate | date .Format }} '
    trailing_separator: Óāį
