executiontime:
    foreground: '#ffffff'
    leading_separator: ┋
    options:
        style: roundrock
        threshold: 0
    style: diamond
    template: ' {{ .FormattedMs }} '
cursor_padding: true
git:
    foreground: '#F62F2E'
    options:
        fetch_status: true
    style: plain
    template: '<#ffffff>on</> {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }} '
node:
    foreground: '#98C379'
    options:
        fetch_version: true
    style: plain
    template: '<#ffffff>via</>  {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }} '
path:
    foreground: '#00C6F7'
    options:
        style: folder
    style: plain
    template: '{{ .Path }}/ '
prompt:
    - segments:
        - session
        - path
        - git
        - node
    - segments:
        - text
rprompt:
    - segments:
        - sysinfo
        - executiontime
session:
    foreground: '#FFBD00'
    style: plain
    template: '{{ .UserName }}''s '
sysinfo:
    foreground: '#85C980'
    style: diamond
    template: 'RAM:{{ (div ((sub .PhysicalTotalMemory .PhysicalAvailableMemory)|float64) 1073741824.0) }}/{{ (div .PhysicalTotalMemory 1073741824.0) }}GB '
    trailing_separator: ' '
text:
    foreground: '#FFBD00'
    style: plain
    template: '⮞ '
