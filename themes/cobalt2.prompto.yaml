$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
final_space: true
git:
    background: '#3AD900'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FFC600{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#FFCC80{{ end }}'
        - '{{ if gt .Ahead 0 }}#B388FF{{ end }}'
        - '{{ if gt .Behind 0 }}#B388FF{{ end }}'
    foreground: '#000000'
    leading_separator: <transparent,background></>
    options:
        fetch_status: true
    style: diamond
    template: ' {{ .HEAD }}{{ if .Staging.Changed }}<#FF6F00>  {{ .Staging.String }}</>{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
    trailing_separator: 
path:
    background: '#1478DB'
    foreground: '#000000'
    leading_separator: 
    options:
        style: full
    style: diamond
    template: '{{ .Path }} '
    trailing_separator: 
prompt:
    - segments:
        - path
        - git
version: 4
