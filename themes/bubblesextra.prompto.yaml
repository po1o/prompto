$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
battery:
    background: '#29315A'
    foreground: '#9B6BDF'
    foreground_templates:
        - '{{if eq "Charging" .State.String}}#40c4ff{{end}}'
        - '{{if eq "Discharging" .State.String}}#ff5722{{end}}'
        - '{{if eq "Full" .State.String}}#4caf50{{end}}'
    leading_separator: ' ¯éÂ'
    options:
        charged_icon: "\x95 "
        charging_icon: 'Ôçí '
        discharging_icon: 'Ôçú '
    style: diamond
    template: '{{ if not .Error }}{{ .Icon }}{{ .Percentage }}{{ end }}{{ .Error }}'
    trailing_separator: ¯é┤
executiontime:
    background: '#29315A'
    foreground: '#AEA4BF'
    leading_separator: ¯éÂ
    options:
        style: austin
        threshold: 150
    style: diamond
    template: '{{ .FormattedMs }}'
    trailing_separator: '¯é┤ '
final_space: true
git:
    background: '#29315A'
    foreground: '#43CCEA'
    foreground_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FF9248{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff4500{{ end }}'
        - '{{ if gt .Ahead 0 }}#B388FF{{ end }}'
        - '{{ if gt .Behind 0 }}#B388FF{{ end }}'
    leading_separator: ' ¯éÂ'
    options:
        branch_template: '{{ trunc 25 .Branch }}'
        fetch_status: true
        fetch_upstream_icon: true
    style: diamond
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ´üä {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} ´üå {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} ¯¡ï {{ .StashCount }}{{ end }} '
    trailing_separator: ¯é┤
go:
    background: '#29315A'
    foreground: '#7FD5EA'
    leading_separator: ' ¯éÂ'
    options:
        fetch_version: false
    style: diamond
    template: ¯ÿª{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: ¯é┤
java:
    background: '#29315A'
    foreground: '#E64747'
    leading_separator: ' ¯éÂ'
    options:
        fetch_version: false
    style: diamond
    template: ¯£©{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: ¯é┤
julia:
    background: '#29315A'
    foreground: '#9B6BDF'
    leading_separator: ' ¯éÂ'
    options:
        fetch_version: false
    style: diamond
    template: '¯ÿñ{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: ¯é┤
node:
    background: '#29315A'
    foreground: '#42E66C'
    leading_separator: ' ¯éÂ'
    options:
        fetch_version: false
    style: diamond
    template: ¯£ÿ{{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}
    trailing_separator: ¯é┤
path:
    background: '#29315A'
    foreground: '#3EC669'
    leading_separator: ¯éÂ
    options:
        style: folder
    style: diamond
    template: ¯ù┐ {{ .Path }}
    trailing_separator: ¯é┤
php:
    background: '#4063D8'
    foreground: '#ffffff'
    leading_separator: ' ¯éÂ'
    options:
        fetch_version: false
    style: diamond
    template: '¯£¢ {{ .Full }} '
    trailing_separator: ¯é┤
prompt:
    - segments:
        - executiontime
        - text
python:
    background: '#29315A'
    foreground: '#E4F34A'
    leading_separator: ' ¯éÂ'
    options:
        fetch_version: false
    style: diamond
    template: ¯êÁ {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}
    trailing_separator: ¯é┤
rprompt:
    - segments:
        - path
        - git
        - python
        - go
        - node
        - ruby
        - java
        - julia
        - php
        - battery
ruby:
    background: '#29315A'
    foreground: '#E64747'
    leading_separator: ' ¯éÂ'
    options:
        fetch_version: false
    style: diamond
    template: ¯×æ{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: ¯é┤
text:
