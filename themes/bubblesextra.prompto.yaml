$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
battery:
    background: '#29315A'
    foreground: '#9B6BDF'
    foreground_templates:
        - '{{if eq "Charging" .State.String}}#40c4ff{{end}}'
        - '{{if eq "Discharging" .State.String}}#ff5722{{end}}'
        - '{{if eq "Full" .State.String}}#4caf50{{end}}'
    leading_separator: ' î‚¶'
    options:
        charged_icon: "\x95 "
        charging_icon: 'â‡، '
        discharging_icon: 'â‡£ '
    style: diamond
    template: '{{ if not .Error }}{{ .Icon }}{{ .Percentage }}{{ end }}{{ .Error }}'
    trailing_separator: î‚´
executiontime:
    background: '#29315A'
    foreground: '#AEA4BF'
    leading_separator: î‚¶
    options:
        style: austin
        threshold: 150
    style: diamond
    template: '{{ .FormattedMs }}'
    trailing_separator: 'î‚´ '
cursor_padding: true
git:
    background: '#29315A'
    foreground: '#43CCEA'
    foreground_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FF9248{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff4500{{ end }}'
        - '{{ if gt .Ahead 0 }}#B388FF{{ end }}'
        - '{{ if gt .Behind 0 }}#B388FF{{ end }}'
    leading_separator: ' î‚¶'
    options:
        branch_template: '{{ trunc 25 .Branch }}'
        fetch_status: true
        fetch_upstream_icon: true
    style: diamond
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ïپ„ {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} ïپ† {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} î­‹ {{ .StashCount }}{{ end }} '
    trailing_separator: î‚´
