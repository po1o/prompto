$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
console_title_template: '{{ .Folder }}'
executiontime:
    background: '#575656'
    foreground: '#d6deeb'
    leading_separator: 
    options:
        style: roundrock
        threshold: 0
    style: diamond
    template: ' {{ .FormattedMs }} '
    trailing_separator: 
git:
    background: '#17D7A0'
    foreground: '#011627'
    leading_separator: 
    options:
        branch_icon: ' '
        fetch_status: true
        fetch_upstream_icon: true
    style: diamond
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
    trailing_separator: 
os:
    background: '#FEF5ED'
    foreground: '#011627'
    leading_separator: 
    options:
        macos: ' '
        ubuntu: ' '
        windows: ' '
    style: diamond
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}}'
    trailing_separator: <transparent,#FEF5ED></>
path:
    options:
        folder_icon: ' '
        folder_separator_icon: '  '
        home_icon: ' '
    style: plain
    template: ' {{ .Path }} '
prompt:
    - segments:
        - os
        - shell
        - sysinfo
        - executiontime
    - segments:
        - text
        - time
        - root
        - path
    - segments:
        - status
root:
    style: plain
    template: '  '
rprompt:
    - segments:
        - git
shell:
    background: '#FEF5ED'
    foreground: '#011627'
    leading_separator: 
    style: diamond
    template:  {{ .Name }}
    trailing_separator: <transparent,#FEF5ED></>
status:
    options:
        always_enabled: true
    style: plain
    template: '╰─ '
sysinfo:
    background: '#516BEB'
    foreground: '#ffffff'
    leading_separator: 
    style: diamond
    template: ' MEM: {{ round .PhysicalPercentUsed .Precision }}% | {{ (div ((sub .PhysicalTotalMemory .PhysicalAvailableMemory)|float64) 1073741824.0) }}/{{ (div .PhysicalTotalMemory 1073741824.0) }}GB  '
    trailing_separator: <transparent,#516BEB></>
text:
    style: plain
    template: ╭─
time:
    options:
        time_format: "15:04"
    style: plain
    template: ' ♥ {{ .CurrentDate | date .Format }} |'
transient:
    - segments:
        - text.transient
text.transient:
    background: transparent
    foreground: '#FEF5ED'
    template: ' '
