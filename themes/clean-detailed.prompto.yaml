$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
console_title_template: '{{ .Folder }}'
executiontime:
    background: '#575656'
    foreground: '#d6deeb'
    leading_separator: оӮІ
    options:
        style: roundrock
        threshold: 0
    style: diamond
    template: ' {{ .FormattedMs }} '
    trailing_separator: оӮ°
git:
    background: '#17D7A0'
    foreground: '#011627'
    leading_separator: оӮІ
    options:
        branch_icon: 'оңҘ '
        fetch_status: true
        fetch_upstream_icon: true
    style: diamond
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} пҒ„ {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} пҒҶ {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} оӯӢ {{ .StashCount }}{{ end }} '
    trailing_separator: оӮ°
os:
    background: '#FEF5ED'
    foreground: '#011627'
    leading_separator: оӮІ
    options:
        macos: 'п…№ '
        ubuntu: 'пҢӣ '
        windows: 'оҳӘ '
    style: diamond
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}}'
    trailing_separator: <transparent,#FEF5ED>оӮІ</>
path:
    options:
        folder_icon: 'пҒ» '
        folder_separator_icon: ' пҒЎ '
        home_icon: 'о¬Ҷ '
    style: plain
    template: ' {{ .Path }} '
prompt:
    - segments:
        - os
        - shell
        - sysinfo
        - executiontime
    - segments:
        - text
        - time
        - root
        - path
    - segments:
        - status
root:
    style: plain
    template: ' пҠ’ '
rprompt:
    - segments:
        - git
shell:
    background: '#FEF5ED'
    foreground: '#011627'
    leading_separator: оӮІ
    style: diamond
    template: п’ү {{ .Name }}
    trailing_separator: <transparent,#FEF5ED>оӮІ</>
status:
    options:
        always_enabled: true
    style: plain
    template: 'в•°в”Җ '
sysinfo:
    background: '#516BEB'
    foreground: '#ffffff'
    leading_separator: оӮІ
    style: diamond
    template: 'оүҰ MEM: {{ round .PhysicalPercentUsed .Precision }}% | {{ (div ((sub .PhysicalTotalMemory .PhysicalAvailableMemory)|float64) 1073741824.0) }}/{{ (div .PhysicalTotalMemory 1073741824.0) }}GB оүҰ '
    trailing_separator: <transparent,#516BEB>оӮІ</>
text:
    style: plain
    template: в•ӯв”Җ
time:
    options:
        time_format: "15:04"
    style: plain
    template: ' вҷҘ {{ .LastDate | date .Format }} |'
transient:
    - segments:
        - text.transient
text.transient:
    background: transparent
    foreground: '#FEF5ED'
    template: 'оҠ… '
