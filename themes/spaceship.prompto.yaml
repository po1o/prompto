$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
final_space: true
git:
    foreground: '#ff94df'
    options:
        branch_icon: ' <#ff94df><b> </b></>'
    style: plain
    template: '<#ffffff>on</> {{ .HEAD }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
path:
    foreground: cyan
    options:
        style: folder
    style: plain
    template: '<#ffffff>in</> {{ .Path }} '
prompt:
    - segments:
        - session
        - path
        - git
    - segments:
        - text
session:
    foreground: lightYellow
    style: plain
    template: '{{ .UserName }} '
text:
    foreground: lightGreen
    style: plain
    template: ❯
version: 4
