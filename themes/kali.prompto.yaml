$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
executiontime:
    foreground: white
    options:
        always_enabled: true
        style: round
    style: plain
    template: ' {{ .FormattedMs }} '
git:
    foreground: white
    style: plain
    template: <{{ if .Root }}lightBlue{{ else }}green{{ end }}>-[</>{{ .HEAD }}<{{ if .Root }}lightBlue{{ else }}green{{ end }}>]</>
path:
    foreground: lightWhite
    options:
        folder_separator_icon: <#c0c0c0>/</>
        style: full
    style: plain
    template: <{{ if .Root }}lightBlue{{ else }}green{{ end }}>-[</>{{ .Path }}<{{ if .Root }}lightBlue{{ else }}green{{ end }}>]</>
prompt:
    - segments:
        - session
        - python
        - path
        - git
    - segments:
        - text
python:
    foreground: yellow
    options:
        fetch_version: false
        fetch_virtual_env: true
    style: plain
    template: <{{ if .Root }}lightBlue{{ else }}green{{ end }}>-[</> {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }}{{ end }}{{ .Full }}{{ end }}<{{ if .Root }}lightBlue{{ else }}green{{ end }}>]</>
rprompt:
    - segments:
        - executiontime
        - status
session:
    foreground: lightBlue
    foreground_templates:
        - '{{ if .Root }}lightRed{{ end }}'
    style: plain
    template: "<{{ if .Root }}lightBlue{{ else }}green{{ end }}>┌──(</>{{ .UserName }}{{ if .Root }}\U0001F480{{ else }}㉿{{ end }}{{ .HostName }}<{{ if .Root }}lightBlue{{ else }}green{{ end }}>)</>"
status:
    foreground: green
    foreground_templates:
        - '{{ if gt .Code 0 }}red{{ end }}'
    options:
        always_enabled: true
    style: plain
    template: ' {{ if gt .Code 0 }}{{else}}{{ end }} '
text:
    foreground: lightBlue
    style: plain
    template: '<{{ if .Root }}lightBlue{{ else }}green{{ end }}>└─</>{{ if .Root }}<lightRed>#</>{{ else }}${{ end }} '
