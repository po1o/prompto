$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
console_title_template: '{{ .UserName }}@{{ .HostName }}'
git:
    options:
        branch_icon: ""
        fetch_status: true
    style: plain
    template: <p:yellow>git</>:({{ if or (.Working.Changed) (.Staging.Changed) (gt .StashCount 0) }}<p:magenta>{{ .HEAD }}</>{{ else }}<p:green>{{ .HEAD }}</>{{ end }}{{ if (gt .Ahead 0)}}<p:cyan>{{ .BranchStatus }}</>{{ end }}{{ if (gt .Behind 0)}}<p:cyan>{{ .BranchStatus }}</>{{ end }}{{ if .Staging.Changed }} <p:green>{{ .Staging.String }}</>{{ end }}{{ if .Working.Changed }} <p:red>{{ .Working.String }}</>{{ end }})
palette:
    background: '#282c34'
    black: '#282c34'
    blue: '#61afef'
    cyan: '#56b6c2'
    foreground: '#dcdfe4'
    green: '#98c379'
    magenta: '#c678dd'
    red: '#e06c75'
    white: '#dcdfe4'
    yellow: '#e5c07b'
path:
    foreground: p:blue
    options:
        style: full
    style: plain
    template: '{{ .Path }} '
prompt:
    - segments:
        - session
        - path
        - git
    - segments:
        - status
session:
    foreground: p:yellow
    style: plain
    template: '{{ .UserName }}@{{ .HostName }} '
status:
    foreground: p:foreground
    options:
        always_enabled: true
    style: plain
    template: '{{ if gt .Code 0 }}<p:red>({{ .Code }}) </>{{ else }}<p:green>({{ .Code }}) </>{{ end }}> '
terminal_background: p:background
version: 4
