battery:
    background: '#a2beef'
    background_templates:
        - '{{if eq "Charging" .State.String}}#00D100{{end}}'
        - '{{if eq "Discharging" .State.String}}#FFCD58{{end}}'
        - '{{if eq "Full" .State.String}}#0476d0{{end}}'
    foreground: '#193549'
    powerline_symbol: 
    style: powerline
    template: ' {{ if not .Error }}{{ .Icon }}{{ .Percentage }}{{ end }}{{ .Error }}  '
cursor_padding: true
git:
    background: '#a2c4e0'
    foreground: '#193549'
    options:
        fetch_upstream_icon: true
    powerline_symbol: 
    style: powerline
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
kubectl:
    background: '#0077c2'
    foreground: '#ffffff'
    powerline_symbol: 
    style: powerline
    template: '  {{.Context}} :: {{if .Namespace}}{{.Namespace}}{{else}}default{{end}} '
node:
    background: '#6CA35E'
    foreground: '#ffffff'
    powerline_symbol: 
    style: powerline
    template: '  {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }} '
os:
    background: '#546E7A'
    foreground: '#26C6DA'
    leading_separator: 
    options:
        macos: mac
    style: diamond
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}} '
    trailing_separator: 
path:
    background: '#14c2dd'
    foreground: '#193549'
    options:
        style: folder
    powerline_symbol: 
    style: powerline
    template: '  {{ .Path }} '
prompt:
    - segments:
        - os
        - session
        - battery
        - path
        - git
        - node
        - root
        - kubectl
        - status
    - segments:
        - text
root:
    background: '#ffff66'
    foreground: '#193549'
    powerline_symbol: 
    style: powerline
    template: '  '
session:
    background: '#546E7A'
    foreground: '#26C6DA'
    powerline_symbol: 
    style: powerline
    template: ' {{ .UserName }}@{{ .HostName }} '
status:
    background: '#007800'
    background_templates:
        - '{{ if gt .Code 0 }}#f1184c{{ end }}'
    foreground: '#ffffff'
    leading_separator: <transparent,background></>
    options:
        always_enabled: true
    style: diamond
    template: '  '
    trailing_separator: 
text:
    foreground: '#007ACC'
    style: plain
    template: '➜ '
