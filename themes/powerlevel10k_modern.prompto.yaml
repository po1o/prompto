git:
    background: '#D4E157'
    foreground: '#000000'
    powerline_symbol: 
    style: powerline
    template: ' {{ .HEAD }} '
go:
    background: '#7FD5EA'
    foreground: '#ffffff'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} <transparent></>'
os:
    background: '#ffffff'
    foreground: '#000000'
    leading_separator: 
    style: diamond
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}} '
    trailing_separator: 
path:
    background: '#0000ff'
    foreground: '#ffffff'
    options:
        style: full
    powerline_symbol: 
    style: powerline
    template: ' {{ .Path }} '
prompt:
    - segments:
        - os
        - root
        - path
        - git
    - segments:
        - status
python:
    background: '#D4E157'
    foreground: '#000000'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }} <transparent></>'
root:
    background: '#0000ff'
    foreground: '#000000'
    options:
        style: full
    powerline_symbol: 
    style: powerline
    template: '  '
rprompt:
    - segments:
        - python
        - go
        - time
status:
    foreground: '#D4E157'
    foreground_templates:
        - '{{ if gt .Code 0 }}#FF5252{{ end }}'
    options:
        always_enabled: true
    style: plain
    template: '❯ '
time:
    background: '#ffffff'
    foreground: '#000000'
    leading_separator: 
    options:
        time_format: "15:04:05"
    style: diamond
    template: ' {{ .LastDate | date .Format }} '
    trailing_separator: 
