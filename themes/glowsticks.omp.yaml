# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
blocks:
  - alignment: left
    segments:
      # Session
      - background: p:black
        foreground: p:white
        invert_powerline: true
        powerline_symbol: î‚¶
        style: powerline
        template: "{{ .UserName }}@{{ .HostName }} "
        type: session

      # Path
      - background: p:orange
        foreground: p:white
        powerline_symbol: î‚°
        options:
          home_icon: "ï€•"
          style: folder
        style: powerline
        template: " ïپ» {{ .Path }} "
        type: path

      # Execution time
      - background: p:darkred
        foreground: p:white
        powerline_symbol: î‚°
        options:
          always_enabled: true
          style: round
        style: powerline
        template: " َ°”ں{{ .FormattedMs }} "
        type: executiontime

      # Exit code
      - background: p:blue
        background_templates:
          - "{{ if gt .Code 0 }}p:red{{ end }}"
        foreground: p:white
        powerline_symbol: î‚°
        options:
          always_enabled: true
        style: diamond
        template: " {{ if gt .Code 0 }}ï€چ {{ reason .Code }}{{ else }}ï€Œ{{ end }} "
        trailing_diamond: î‚´
        type: status
    type: prompt
  - alignment: right
    segments:
      # Shell
      - background: p:black
        foreground: p:white
        style: plain
        template: <p:black,transparent>î‚¶</>ï„  {{ .Name }}<transparent,p:black>î‚²</>
        type: shell

      # Battery
      - background_templates:
          - '{{if eq "Charging" .State.String }}p:green{{end}}'
          - '{{if eq "Discharging" .State.String}}p:orange{{end}}'
        foreground: p:white
        leading_diamond: î‚²
        options:
          charged_icon: َ°‚„
          charging_icon: َ°‚„
          discharging_icon: "َ°پ¹ "
        style: diamond
        template: " {{.Templates }}{{ .Percentage}}َ°ڈ° <transparent>î‚²</>"
        templates:
          - '{{if eq "Discharging" .State.String}}{{if lt .Percentage 11}}َ°پ؛{{else if lt .Percentage 21}}َ°پ»{{else if lt .Percentage 31}}َ°پ¼{{else if lt .Percentage 41}}َ°پ½{{else if lt .Percentage 51}}َ°پ¾{{else if lt .Percentage 61}}َ°پ¾{{else if lt .Percentage 71}}َ°‚€{{else if lt .Percentage 81}}َ°‚پ{{else if lt .Percentage 91}}َ°‚‚{{else}}َ°پ¹{{end}}{{end}}'
          - '{{if eq "Charging" .State.String}}{{ if lt .Percentage 21}}َ°‚†{{else if lt .Percentage 31}}َ°‚‡{{else if lt .Percentage 41}}َ°‚ˆ{{else if lt .Percentage 61}}َ°‚‰{{else if lt .Percentage 81}}َ°‚ٹ{{else if lt .Percentage 91}}َ°‚‹{{else}}َ°‚„{{end}}{{end}}'
        templates_logic: first_match
        type: battery
    type: rprompt
final_space: true
console_title_template: ï„  {{ .Shell }} in {{ if ne .Folder "~"}}ïپ» {{ .Folder }}{{else}}ï€•{{end}}
palette:
  black: "#33395b"
  blue: "#359ddd"
  darkred: "#7c0a16"
  green: "#277b48"
  orange: "#ff972e"
  red: "#de3142"
  white: "#efeef4"
secondary_prompt:
  background: transparent
  foreground: p:white
  template: "ïپ، "
transient_prompt:
  background: transparent
  foreground: p:white
  template: "ïپ، "
version: 4
