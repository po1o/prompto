$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
angular:
    background: '#ffffff'
    foreground: '#ce092f'
    leading_separator: ' оӮ¶'
    style: diamond
    template: оқ“ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
aurelia:
    background: '#ffffff'
    foreground: '#de1f84'
    leading_separator: ' оӮ¶'
    style: diamond
    template: Оұ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
aws:
    background: '#565656'
    foreground: '#faa029'
    leading_separator: оӮ¶
    style: diamond
    template: оһӯ {{.Profile}}{{if .Region}}@{{.Region}}{{end}}
    trailing_separator: 'оӮҙ '
azfunc:
    background: '#ffffff'
    foreground: '#5398c2'
    leading_separator: оӮ¶
    style: diamond
    template: п„„<#f5bf45>пғ§</>п„… {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
battery:
    background: '#f36943'
    background_templates:
        - '{{if eq "Charging" .State.String}}#b8e994{{end}}'
        - '{{if eq "Discharging" .State.String}}#fff34e{{end}}'
        - '{{if eq "Full" .State.String}}#33DD2D{{end}}'
    foreground: '#262626'
    invert_powerline: true
    options:
        charged_icon: 'пүҖ '
        charging_icon: 'пҮҰ '
        discharging_icon: 'оҲҙ '
    powerline_symbol: оӮІ
    style: powerline
    template: ' {{ if not .Error }}{{ .Icon }}{{ .Percentage }}{{ end }}{{ .Error }}пҠ• '
dart:
    background: '#e1e8e9'
    foreground: '#055b9c'
    leading_separator: ' оӮ¶'
    style: diamond
    template: оһҳ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
dotnet:
    background: '#0e0e0e'
    foreground: '#0d6da8'
    leading_separator: оӮ¶
    style: diamond
    template: оқҝ {{ if .Unsupported }}пҒұ{{ else }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
executiontime:
    background: '#83769c'
    foreground: '#ffffff'
    options:
        style: roundrock
        threshold: 0
    style: diamond
    template: ' о®ў {{ .FormattedMs }} '
    trailing_separator: оӮҙ
git:
    background: '#FFFB38'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#ffeb95{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#c5e478{{ end }}'
        - '{{ if gt .Ahead 0 }}#C792EA{{ end }}'
        - '{{ if gt .Behind 0 }}#C792EA{{ end }}'
    foreground: '#011627'
    options:
        branch_icon: 'оңҘ '
        fetch_status: true
        fetch_upstream_icon: true
    powerline_symbol: оӮ°
    style: powerline
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} пҒ„ {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}<#ef5350> пҒҶ {{ .Staging.String }}</>{{ end }} '
go:
    background: '#ffffff'
    foreground: '#06aad5'
    leading_separator: оӮ¶
    style: diamond
    template: оҳҰ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
java:
    background: '#0e8ac8'
    foreground: '#ffffff'
    leading_separator: оӮ¶
    style: diamond
    template: оңё {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
julia:
    background: '#945bb3'
    foreground: '#359a25'
    leading_separator: ' оӮ¶'
    style: diamond
    template: <#ca3c34>оҳӨ</> {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
kubectl:
    background: '#316ce4'
    foreground: '#ffffff'
    leading_separator: оӮ¶
    style: diamond
    template: 'пҢҲ {{.Context}}{{if .Namespace}} :: {{.Namespace}}{{end}}'
    trailing_separator: оӮҙ
node:
    background: '#303030'
    foreground: '#3C873A'
    leading_separator: оӮ¶
    options:
        fetch_package_manager: true
        npm_icon: ' <#cc3a3a>о—ә</> '
        yarn_icon: ' <#348cba>оҡ§</>'
    style: diamond
    template: оңҳ {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}
    trailing_separator: 'оӮҙ '
nx:
    background: '#1e293b'
    foreground: '#ffffff'
    leading_separator: ' оӮ¶'
    style: diamond
    template: '{{ if .Error }}{{ .Error }}{{ else }}Nx {{ .Full }}{{ end }}'
    trailing_separator: 'оӮҙ '
os:
    background: '#b2bec3'
    foreground: '#222222'
    leading_separator: оӮ¶
    options:
        linux: оң’
        macos: оң‘
        windows: оңҸ
    style: diamond
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}} '
    trailing_separator: <transparent,background>оӮІ</>
path:
    background: '#FF9248'
    foreground: '#2d3436'
    options:
        folder_icon: ' пҒ» '
        home_icon: оҳ—
        style: folder
    powerline_symbol: оӮ°
    style: powerline
    template: ' пҒ»оӘң {{ .Path }} '
prompt:
    - segments:
        - shell
        - root
        - path
        - git
        - executiontime
    - segments:
        - text
        - status
python:
    background: '#306998'
    foreground: '#FFE873'
    leading_separator: оӮ¶
    style: diamond
    template: оҲө {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
root:
    background: '#ef5350'
    foreground: '#FFFB38'
    style: diamond
    template: '<parentBackground>оӮ°</> пҠ’ '
rprompt:
    - segments:
        - node
        - python
        - java
        - dotnet
        - go
        - rust
        - dart
        - angular
        - aurelia
        - nx
        - julia
        - ruby
        - azfunc
        - aws
        - kubectl
        - os
        - battery
        - time
ruby:
    background: '#ffffff'
    foreground: '#9c1006'
    leading_separator: оӮ¶
    style: diamond
    template: оһ‘ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
rust:
    background: '#f3f0ec'
    foreground: '#925837'
    leading_separator: оӮ¶
    style: diamond
    template: оһЁ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}
    trailing_separator: 'оӮҙ '
shell:
    background: '#0077c2'
    foreground: '#ffffff'
    leading_separator: в•ӯв”ҖоӮ¶
    style: diamond
    template: 'п„  {{ .Name }} '
status:
    foreground: '#e0f8ff'
    foreground_templates:
        - '{{ if gt .Code 0 }}#ef5350{{ end }}'
    options:
        always_enabled: true
    style: plain
    template: 'оҠ…оӘ¶ '
text:
    foreground: '#21c7c7'
    style: plain
    template: в•°в”Җ
time:
    background: '#40c4ff'
    foreground: '#ffffff'
    invert_powerline: true
    leading_separator: оӮІ
    options:
        time_format: _2,15:04
    style: diamond
    template: ' пҒі {{ .CurrentDate | date .Format }} '
    trailing_separator: оӮҙ
version: 4
