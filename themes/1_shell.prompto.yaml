console_title_template: '{{ .Folder }}'
executiontime:
    foreground: '#a9ffb4'
    options:
        style: dallas
        threshold: 0
    style: diamond
    template: ' {{ .FormattedMs }}s <#ffffff></>'
git:
    foreground: '#ee79d1'
    options:
        branch_icon: ' '
        fetch_status: true
        fetch_upstream_icon: true
    style: diamond
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
path:
    foreground: '#ffafd2'
    leading_separator: <#00c7fc>  </><#ffafd2>{</>
    options:
        folder_icon: 
        folder_separator_icon: '  '
        home_icon: home
        style: agnoster_full
    style: diamond
    template: '  {{ .Path }} '
    trailing_separator: <#ffafd2>}</>
prompt:
    - segments:
        - session
        - time
        - git
    - segments:
        - path
        - status
root:
    options:
        root_icon: ' '
    style: diamond
    template: '  '
rprompt:
    - segments:
        - text
        - executiontime
        - root
        - sysinfo
session:
    foreground: '#ffbebc'
    leading_separator: <#ff70a6>  </>
    style: diamond
    template: '{{ .UserName }} <#ffffff>on</>'
status:
    foreground: '#A9FFB4'
    foreground_templates:
        - '{{ if gt .Code 0 }}#ef5350{{ end }}'
    options:
        always_enabled: true
    style: plain
    template: '  '
sysinfo:
    foreground: '#94ffa2'
    style: diamond
    template: ' <#ffffff>MEM:</> {{ round .PhysicalPercentUsed .Precision }}% ({{ (div ((sub .PhysicalTotalMemory .PhysicalAvailableMemory)|float64) 1073741824.0) }}/{{ (div .PhysicalTotalMemory 1073741824.0) }}GB)'
text:
    foreground: '#a9ffb4'
    style: plain
time:
    foreground: '#bc93ff'
    style: diamond
    template: ' {{ .LastDate | date "Monday" }} <#ffffff>at</> {{ .LastDate | date "3:04 PM" }} '
transient:
    - segments:
        - text.transient
text.transient:
    background: transparent
    foreground: '#FEF5ED'
    template: ' '
