blocks:
    - alignment: left
      newline: true
      segments:
        - foreground: cyan
          options:
            alpine: пМА
            arch: пМГ
            centos: пМД
            debian: пМЖ
            elementary: пМЙ
            fedora: пМК
            gentoo: пМН
            linux: оЬТ
            macos: пЕє
            manjaro: пМТ
            mint: пМП
            opensuse: пМФ
            raspbian: пМХ
            ubuntu: пМЫ
            windows: "\U000F0372"
          style: diamond
          template: ' {{ if .WSL }}оШ™пСМ{{ end }}{{.Icon}}вХР'
          type: os
        - background: green
          foreground: black
          leading_diamond: оВ≤
          style: diamond
          template: ' пТЙ {{ .Name }} '
          type: shell
        - background: magenta
          foreground: black
          powerline_symbol: оВЉ
          style: powerline
          template: " {{ if .SSHSession }}\U000F0318 {{ end }}{{ .UserName }}@{{ .HostName }} "
          type: session
        - background: lightRed
          foreground: black
          options:
            fetch_version: true
          powerline_symbol: оВЉ
          style: powerline
          template: " \U000F06B2 {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
          type: angular
        - background: magenta
          foreground: white
          options:
            fetch_version: true
          powerline_symbol: оВЉ
          style: powerline
          template: ' ќ± {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
          type: aurelia
        - background: yellow
          foreground: black
          options:
            display_default: false
          powerline_symbol: оВЉ
          style: powerline
          template: ' оЮ≠ {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} '
          type: aws
        - background: lightBlue
          foreground: black
          powerline_symbol: оВЉ
          style: powerline
          template: ' піГ Subscription {{ .Name }} ({{ if .EnvironmentName | contains "AzureCloud" }}{{ "Global" }}{{ else }}{{ .EnvironmentName }}{{ end }}) '
          type: az
        - background: yellow
          foreground: black
          options:
            display_mode: files
            fetch_version: false
          powerline_symbol: оВЉ
          style: powerline
          template: ' піГ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
          type: azfunc
        - background: lightCyan
          foreground: black
          options:
            fetch_version: true
          powerline_symbol: оВЉ
          style: powerline
          template: " \U000F07D3 {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
          type: go
        - background: lightCyan
          foreground: black
          powerline_symbol: оВЉ
          style: powerline
          template: ' оЬЄ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
          type: java
        - background: lightCyan
          foreground: black
          options:
            fetch_version: true
          powerline_symbol: оВЉ
          style: powerline
          template: ' оШ§ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
          type: julia
        - background: lightYellow
          foreground: black
          powerline_symbol: оВЉ
          style: powerline
          template: " \U000F0833 {{.Context}}{{if .Namespace}} :: {{.Namespace}}{{end}} "
          type: kubectl
        - background: lightGreen
          foreground: black
          options:
            fetch_version: true
          powerline_symbol: оВЉ
          style: powerline
          template: " \U000F0399 {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }} "
          type: node
        - background: lightCyan
          foreground: black
          powerline_symbol: оВЉ
          style: powerline
          template: ' оЬљ {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }} '
          type: php
        - background: lightYellow
          foreground: black
          powerline_symbol: оВЉ
          style: powerline
          template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ if .Version }}пТЗ {{.Version}}{{ end }} {{ if .Name }}{{ .Name }}{{ end }}{{ end }} '
          type: project
        - background: lightYellow
          foreground: black
          options:
            display_mode: files
            fetch_virtual_env: false
          powerline_symbol: оВЉ
          style: powerline
          template: ' оИµ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
          type: python
        - background: red
          foreground: black
          options:
            display_mode: files
            fetch_version: true
          powerline_symbol: оВЉ
          style: powerline
          template: ' оЮС {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
          type: ruby
        - background: lightRed
          foreground: black
          options:
            display_mode: files
            fetch_version: true
          powerline_symbol: оВЉ
          style: powerline
          template: ' оЮ® {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
          type: rust
        - background: blue
          foreground: black
          options:
            display_mode: files
            fetch_version: true
          powerline_symbol: оВЉ
          style: powerline
          template: ' оЭХ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
          type: swift
        - background: yellow
          foreground: black
          options:
            time_format: Mon | 15:04:05
          powerline_symbol: оВЉ
          style: powerline
          template: ' {{ .CurrentDate | date .Format }} '
          type: time
        - background: cyan
          foreground: black
          options:
            style: austin
            threshold: 0
          style: diamond
          template: ' {{ .FormattedMs }} '
          trailing_diamond: оВ∞
          type: executiontime
      type: prompt
    - alignment: right
      segments:
        - background: magenta
          foreground: black
          leading_diamond: оВ≤
          options:
            branch_icon: 'оЬ• '
            fetch_status: true
            fetch_upstream_icon: true
          style: diamond
          template: "{{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} пБД {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} пБЖ {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} \U000F0193 {{ .StashCount }}{{ end }}"
          trailing_diamond: оВ∞
          type: git
      type: prompt
    - alignment: left
      newline: true
      segments:
        - foreground: cyan
          style: plain
          template: ' вХЪ'
          type: text
        - background: blue
          background_templates:
            - '{{ if gt .Code 0 }}red{{ end }}'
          foreground: black
          leading_diamond: оВ≤
          options:
            always_enabled: true
          style: diamond
          template: " {{ if gt .Code 0 }}\U000F02D4 {{ else }}пАД {{ end }}{{ if eq ( gt .Code 0 ) .Segments.Path.Writable}} {{ end }}"
          type: status
        - background: blue
          background_templates:
            - '{{ if not .Writable }}red{{ end }}'
          foreground: black
          options:
            folder_icon: пБї
            folder_separator_icon: " \U000F0055 "
            home_icon: "\U000F02DC"
            max_depth: 3
            style: agnoster_short
          powerline_symbol: оВЉ
          style: powerline
          template: "{{ if eq ( gt .Code 0 ) .Writable }} {{ end }}оЧњ {{ .Path }}{{ if not .Writable  }} \U000F0341 {{ end }}{{ if and .Writable .Root }} {{end}} "
          type: path
        - background: blue
          background_templates:
            - '{{ if and .Segments.Path.Writable (not .Root) }}{{ else }}red{{ end }}'
          foreground: white
          options:
            root_icon: пКТ
          style: diamond
          template: '{{ if not .Root }}в†А{{ end }}{{ if and .Root ( not .Segments.Path.Writable ) }}пГІ {{ end }}{{ if and .Root .Segments.Path.Writable }} пГІ {{ end }}'
          trailing_diamond: оВ∞
          type: text
      type: prompt
console_title_template: '{{ .Folder }}'
final_space: true
