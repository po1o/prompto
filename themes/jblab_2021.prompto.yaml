$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
console_title_template: "{{if .Root}} ⚡ {{end}}{{.Folder | replace \"~\" \"\U0001F3E0\"}} @ {{.HostName}}"
executiontime:
    background: '#26BDBB'
    foreground: '#0C212F'
    leading_separator: <transparent,#26BDBB></>
    options:
        style: dallas
        threshold: 0
    style: diamond
    template: ' {{ .FormattedMs }}s '
    trailing_separator: 
cursor_padding: true
git:
    background: '#280C2E'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#7621DE{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#7621DE{{ end }}'
        - '{{ if gt .Ahead 0 }}#7621DE{{ end }}'
        - '{{ if gt .Behind 0 }}#7621DE{{ end }}'
    foreground: '#FFFFFF'
    options:
        fetch_status: true
        fetch_upstream_icon: true
    powerline_symbol: 
    style: powerline
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
os:
    background: '#0C212F'
    foreground: '#FFFFFF'
    leading_separator: 
    style: diamond
    template: ' {{ .Icon }} '
    trailing_separator: 
path:
    background: '#26BDBB'
    foreground: '#0C212F'
    leading_separator: <transparent,#26BDBB></>
    options:
        folder_icon: '...'
        folder_separator_icon: <transparent>  </>
        home_icon: 
        style: agnoster_short
    style: diamond
    template: ' {{ .Path }} '
    trailing_separator: 
prompt:
    - segments:
        - os
        - root
        - path
        - git
        - time
        - executiontime
        - status
root:
    background: '#DE2121'
    foreground: '#FFFFFF'
    leading_separator: <transparent,#DE2121></>
    style: diamond
    template: '  '
    trailing_separator: 
status:
    background: '#910000'
    foreground: '#ffffff'
    leading_separator: <transparent,background></>
    style: diamond
    template: '<transparent> </> {{ reason .Code }} '
    trailing_separator: 
time:
    background: '#0C212F'
    foreground: '#FFFFFF'
    leading_separator: <transparent,#0C212F></>
    options:
        time_format: "15:04"
    style: diamond
    template: ' {{ .CurrentDate | date .Format }} '
    trailing_separator: 
