cursor_padding: true
git:
    background: '#95ffa4'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#ff9248{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#f26d50{{ end }}'
        - '{{ if gt .Ahead 0 }}#89d1dc{{ end }}'
        - '{{ if gt .Behind 0 }}#c5b6ad{{ end }}'
    foreground: '#100e23'
    options:
        branch_ahead_icon: ↑
        branch_behind_icon: ↓
        branch_gone_icon: ≢
        branch_icon: ' '
        branch_identical_icon: ≡
        cherry_pick_icon: '✓ '
        commit_icon: '▷ '
        fetch_status: true
        merge_icon: '◴ '
        no_commits_icon: '[no commits]'
        rebase_icon: 'Ɫ '
        tag_icon: '▶ '
    powerline_symbol: 
    style: powerline
    template: ' {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} │{{ end }}{{ if .Staging.Changed }} {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} {{ .StashCount }}{{ end }} '
path:
    background: '#91ddff'
    foreground: '#100e23'
    options:
        style: folder
    powerline_symbol: 
    style: powerline
    template: ' {{ .Path }} '
prompt:
    - segments:
        - session
        - path
        - git
        - terraform
        - status
    - segments:
        - text
        - text.2
root:
    foreground: '#ff8080'
    style: plain
    template: ' <#757575,>as</> root'
rprompt:
    - segments:
        - shell
        - root
        - time
session:
    foreground: '#757575'
    style: plain
    template: '┌ {{ .UserName }}@{{ .HostName }} '
shell:
    foreground: '#007acc'
    style: plain
    template: '{{ .Name }}'
status:
    background: '#ff8080'
    foreground: '#ffffff'
    powerline_symbol: 
    style: powerline
    template: ' error '
terraform:
    background: '#ffee58'
    foreground: '#100e23'
    powerline_symbol: 
    style: powerline
    template: ' {{ .WorkspaceName }} '
text:
    foreground: '#757575'
    style: plain
    template: '└ '
text.2:
    foreground: '#ffffff'
    style: plain
    template: $
time:
    foreground: '#689f38'
    options:
        time_format: "15:04:05"
    style: plain
    template: ' <#757575,>|</> {{ .LastDate | date .Format }}'
