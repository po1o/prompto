executiontime:
    background: '#83769c'
    foreground: '#ffffff'
    invert_powerline: true
    options:
        always_enabled: true
    powerline_symbol: î‚²
    style: powerline
    template: ' {{ .FormattedMs }} '
cursor_padding: true
git:
    background: '#caffbf'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FCA17D{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#f26d50{{ end }}'
        - '{{ if gt .Ahead 0 }}#89d1dc{{ end }}'
        - '{{ if gt .Behind 0 }}#f17c37{{ end }}'
    foreground: '#333333'
    options:
        fetch_status: true
        fetch_upstream_icon: true
    powerline_symbol: î‚°
    style: powerline
    template: ' {{ .UpstreamIcon }} {{ .HEAD }}{{ if .Staging.Changed }} ïپ† {{ .Staging.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }} ïپ„ {{ .Working.String }}{{ end }} '
node:
    background: '#f78fb3'
    foreground: '#ffffff'
