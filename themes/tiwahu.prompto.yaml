$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
dotnet:
    background: '#7014eb'
    foreground: '#ffffff'
    options:
        fetch_version: false
    style: plain
    template: '  '
executiontime:
    background: '#007ACC'
    foreground: '#222222'
    options:
        style: austin
        threshold: 321
    style: plain
    template: ' {{ .FormattedMs }} '
git:
    background: '#cf432B'
    foreground: '#f1f0e9'
    options:
        branch_icon: ' '
        cherry_pick_icon: ' '
        commit_icon: ' '
        fetch_status: false
        fetch_upstream_icon: false
        merge_icon: ' '
        no_commits_icon: ' '
        rebase_icon: ' '
        revert_icon: ' '
        tag_icon: ' '
    style: plain
    template: ' {{ .HEAD }} '
go:
    background: '#7FD5EA'
    foreground: '#ffffff'
    options:
        fetch_version: false
    style: plain
    template: '  '
os:
    background: '#222222'
    foreground: '#666666'
    style: plain
    template: ' {{ if .WSL }} {{ end }}{{.Icon}}'
path:
    background: '#444444'
    foreground: '#cccccc'
    options:
        folder_icon: …
        style: mixed
    style: plain
    template: ' {{ .Path }} '
prompt:
    - segments:
        - executiontime
        - status
        - root
        - os
        - session
        - path
        - git
        - dotnet
        - go
        - python
        - rust
    - segments:
        - shell
python:
    background: '#906cff'
    foreground: '#100e23'
    options:
        fetch_version: false
    style: plain
    template: '  '
root:
    background: '#ffcc88'
    foreground: '#222222'
    style: plain
    template: 
rust:
    background: '#99908a'
    foreground: '#193549'
    options:
        fetch_version: false
    style: plain
    template: '  '
session:
    background: '#222222'
    foreground: '#666666'
    style: plain
    template: ' {{ if .SSHSession }} {{ end }}{{ .UserName }}@{{ .HostName }} '
shell:
    foreground: '#007ACC'
    options:
        mapped_shell_names:
            bash: $
            cmd: '>'
            fish: ~>
            lua: '>'
            nu: :)
            pwsh: ❯
            shell: ❯
            zsh: '%'
    style: plain
    template: '{{ .Name }} '
status:
    background: '#880000'
    foreground: '#ff8888'
    style: plain
    template: '{{ if gt .Code 0 }} {{ .Code }} {{ end }}'
version: 4
