$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
angular:
    background: '#ffffff'
    foreground: '#ce092f'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
aurelia:
    background: '#ffffff'
    foreground: '#de1f84'
    leading_separator: 
    style: diamond
    template: 'α {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
aws:
    background: '#565656'
    foreground: '#faa029'
    leading_separator: 
    style: diamond
    template: ' {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} '
    trailing_separator: 
az:
    background: '#ffffff'
    foreground: '#337bb6'
    leading_separator: 
    style: diamond
    template: ' {{ .EnvironmentName }} '
    trailing_separator: 
azfunc:
    background: '#ffffff'
    foreground: '#5398c2'
    leading_separator: 
    style: diamond
    template: '<#f5bf45></> {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
cds:
    background: '#5a7a94'
    foreground: '#100e23'
    leading_separator: 
    style: diamond
    template: '  cds {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
cf:
    background: '#ffffff'
    foreground: '#1d5185'
    leading_separator: 
    style: diamond
    template: '  cf {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
cftarget:
    background: '#ffffff'
    foreground: '#1d5185'
    leading_separator: 
    style: diamond
    template: ' {{if .Org }}{{ .Org }}{{ end }}{{ if .Space }}/{{ .Space }}{{ end }} '
    trailing_separator: 
cmake:
    background: '#d2d2d2'
    foreground: '#01a300'
    leading_separator: 
    style: diamond
    template: '<#2829b2></> <#be1818></>  cmake {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
console_title_template: '{{ .Folder }}'
crystal:
    background: '#ffffff'
    foreground: '#000000'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
dart:
    background: '#e1e8e9'
    foreground: '#055b9c'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
dotnet:
    background: '#0e0e0e'
    foreground: '#0d6da8'
    leading_separator: 
    style: diamond
    template: '  {{ if .Unsupported }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
executiontime:
    background: '#575656'
    foreground: '#d6deeb'
    leading_separator: 
    options:
        style: roundrock
        threshold: 0
    style: diamond
    template: ' {{ .FormattedMs }}'
    trailing_separator: 
cursor_padding: true
flutter:
    background: '#06A4CE'
    foreground: '#ffffff'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
git:
    background: '#addb67'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#e4cf6a{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#f78c6c{{ end }}'
        - '{{ if gt .Ahead 0 }}#C792EA{{ end }}'
        - '{{ if gt .Behind 0 }}#c792ea{{ end }}'
    foreground: '#011627'
    options:
        branch_icon: ' '
        fetch_status: true
        fetch_upstream_icon: true
        mapped_branches:
            bug/*: "\U0001F41B "
            feat/*: "\U0001F680 "
    powerline_symbol: 
    style: powerline
    template: ' {{ .UpstreamIcon }} {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
go:
    background: '#ffffff'
    foreground: '#06aad5'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
haskell:
    background: '#100e23'
    foreground: '#906cff'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
java:
    background: '#ffffff'
    foreground: '#ec2729'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
julia:
    background: '#945bb3'
    foreground: '#ffffff'
    leading_separator: 
    style: diamond
    template: '<#ca3c34></> {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
kotlin:
    background: '#906cff'
    foreground: '#ffffff'
    leading_separator: 
    style: diamond
    template: 'K {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
kubectl:
    background: '#316ce4'
    foreground: '#ffffff'
    leading_separator: 
    style: diamond
    template: ' {{.Context}} :: {{if .Namespace}}{{.Namespace}}{{else}}default{{end}} '
    trailing_separator: 
lua:
    background: '#ffffff'
    foreground: '#000081'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
node:
    background: '#303030'
    foreground: '#3C873A'
    leading_separator: 
    options:
        fetch_package_manager: true
        npm_icon: '<#cc3a3a></> '
        yarn_icon: '<#348cba></> '
    style: diamond
    template: ' {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }} '
    trailing_separator: 
nx:
    background: '#6488c0'
    foreground: '#1e293b'
    leading_separator: 
    style: diamond
    template: 'Nx {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
os:
    background: '#21c7a8'
    foreground: '#011627'
    leading_separator: ╭─
    options:
        windows: 
    style: diamond
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}}  '
    trailing_separator: 
path:
    background: '#82AAFF'
    foreground: '#011627'
    leading_powerline_symbol: 
    options:
        folder_icon: ' '
        folder_separator_icon: '<#011627></> '
        home_icon: '  '
        style: agnoster
    powerline_symbol: 
    style: powerline
    template: '{{ path .Path .Location }}'
perl:
    background: '#41436d'
    foreground: '#ffffff'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
php:
    background: '#787CB5'
    foreground: '#000000'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
prompt:
    - segments:
        - os
        - root
        - path
        - git
        - executiontime
    - segments:
        - text
        - spotify
        - status
python:
    background: '#306998'
    foreground: '#FFE873'
    leading_separator: 
    style: diamond
    template:   {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}
    trailing_separator: 
r:
    background: '#b9bbbf'
    foreground: '#1c68bd'
    leading_separator: 
    style: diamond
    template: 'R {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
root:
    background: '#ef5350'
    foreground: '#ffeb95'
    powerline_symbol: 
    style: powerline
    template: '  '
rprompt:
    - segments:
        - shell
        - sysinfo
        - angular
        - aurelia
        - aws
        - az
        - azfunc
        - cds
        - crystal
        - cf
        - cftarget
        - cmake
        - dart
        - dotnet
        - flutter
        - go
        - haskell
        - java
        - julia
        - kotlin
        - kubectl
        - lua
        - node
        - nx
        - perl
        - php
        - python
        - r
        - ruby
        - rust
        - swift
        - time
ruby:
    background: '#ffffff'
    foreground: '#9c1006'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
rust:
    background: '#ffffff'
    foreground: '#000000'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
shell:
    background: '#d6deeb'
    foreground: '#011627'
    leading_separator: 
    style: diamond
    template: '  {{ .Name }} '
    trailing_separator: 
spotify:
    background: '#1DB954'
    foreground: '#011627'
    leading_separator: 
    options:
        playing_icon: ' '
    style: diamond
    template: ' {{ .Icon }}{{ if ne .Status "stopped" }}{{ .Artist }} ~ {{ .Track }}{{ end }} '
    trailing_separator: ' '
status:
    foreground: '#22da6e'
    foreground_templates:
        - '{{ if gt .Code 0 }}#ef5350{{ end }}'
    options:
        always_enabled: true
    style: plain
    template: 
swift:
    background: '#fe562e'
    foreground: '#ffffff'
    leading_separator: 
    style: diamond
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
    trailing_separator: 
sysinfo:
    background: '#8f43f3'
    foreground: '#ffffff'
    leading_separator: 
    style: diamond
    template: ' {{ round .PhysicalPercentUsed .Precision }}% '
    trailing_separator: 
text:
    foreground: '#21c7a8'
    style: plain
    template: ╰─
time:
    background: '#234d70'
    foreground: '#d6deeb'
    leading_separator: 
    options:
        time_format: "15:04:05"
    style: diamond
    template:  {{ .CurrentDate | date .Format }}
    trailing_separator: 
transient:
    - segments:
        - text.transient
text.transient:
    background: transparent
    foreground: '#d6deeb'
    template: ' '
