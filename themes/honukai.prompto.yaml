$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
cursor_padding: true
git:
    foreground: '#B8B80A'
    style: plain
    template: '<#ffffff>on git:</>{{ .HEAD }} '
path:
    foreground: '#0973C0'
    options:
        folder_icon: 
        folder_separator_icon: '  '
        style: full
    style: plain
    template: ' {{ .Path }} '
prompt:
    - segments:
        - session
        - path
        - git
    - segments:
        - root
        - python
        - status
        - text
python:
    foreground: '#100e23'
    style: plain
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }} '
root:
    foreground: '#CECE04'
    style: plain
    template: ' '
rprompt:
    - segments:
        - time
session:
    foreground: '#FFFFFF'
    style: plain
    template: '<#0377C8># </><#0377C8>{{ .UserName }}</> <#ffffff>in</> <#4A9207>{{ .HostName }}</> '
status:
    foreground: '#CB4B16'
    style: plain
    template: ' {{ reason .Code }} '
text:
    foreground: '#CC4B16'
    style: plain
    template: '➜ '
time:
    foreground: '#ffffff'
    style: plain
    template: '[{{ .CurrentDate | date .Format }}]'
