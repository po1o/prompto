aws:
    background_templates:
        - '{{if contains "default" .Profile}}#FFA400{{end}}'
        - '{{if contains "jan" .Profile}}#f1184c{{end}}'
    foreground: '#ffffff'
    invert_powerline: true
    options:
        display_default: false
    powerline_symbol: 
    style: powerline
    template: ' {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }}  '
azfunc:
    background: '#FEAC19'
    foreground: '#ffffff'
    invert_powerline: true
    options:
        display_mode: files
        fetch_version: false
    powerline_symbol: 
    style: powerline
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} '
console_title_template: '{{ .Shell }} in {{ .Folder }}'
executiontime:
    background: '#c4a000'
    foreground: '#000000'
    invert_powerline: true
    powerline_symbol: 
    style: powerline
    template: ' {{ .FormattedMs }}  '
cursor_padding: true
git:
    background: '#4e9a06'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#c4a000{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#f26d50{{ end }}'
        - '{{ if gt .Ahead 0 }}#89d1dc{{ end }}'
        - '{{ if gt .Behind 0 }}#4e9a06{{ end }}'
    foreground: '#000000'
    options:
        branch_icon: ' '
        fetch_status: true
        fetch_upstream_icon: true
    powerline_symbol: 
    style: powerline
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
go:
    background: '#00acd7'
    foreground: '#111111'
    invert_powerline: true
    options:
        fetch_version: true
    powerline_symbol: 
    style: powerline
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}  '
julia:
    background: '#4063D8'
    foreground: '#111111'
    invert_powerline: true
    options:
        fetch_version: true
    powerline_symbol: 
    style: powerline
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}  '
node:
    background: '#689f63'
    foreground: '#ffffff'
    invert_powerline: true
    options:
        fetch_version: true
    powerline_symbol: 
    style: powerline
    template: ' {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}  '
os:
    background: '#d3d7cf'
    foreground: '#000000'
    leading_separator: ╭─
    style: diamond
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}} '
path:
    background: '#3465a4'
    foreground: '#e4e4e4'
    options:
        home_icon: "~"
        style: full
    powerline_symbol: 
    style: powerline
    template: '  {{ .Path }} '
prompt:
    - segments:
        - os
        - path
        - git
    - segments:
        - text
python:
    background: '#FFDE57'
    foreground: '#111111'
    invert_powerline: true
    options:
        display_mode: files
        fetch_virtual_env: false
    powerline_symbol: 
    style: powerline
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}  '
root:
    background: '#ffff66'
    foreground: '#111111'
    invert_powerline: true
    powerline_symbol: 
    style: powerline
    template: '  '
rprompt:
    - segments:
        - node
        - go
        - julia
        - python
        - ruby
        - azfunc
        - aws
        - root
        - executiontime
        - status
        - time
    - segments:
        - text.2
ruby:
    background: '#AE1401'
    foreground: '#ffffff'
    invert_powerline: true
    options:
        display_mode: files
        fetch_version: true
    powerline_symbol: 
    style: powerline
    template: ' {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}  '
status:
    background: '#000000'
    background_templates:
        - '{{ if gt .Code 0 }}#cc2222{{ end }}'
    foreground: '#d3d7cf'
    invert_powerline: true
    options:
        always_enabled: true
    powerline_symbol: 
    style: powerline
    template: ' {{ if gt .Code 0 }}{{ reason .Code }}{{ else }}{{ end }} '
text:
    foreground: '#d3d7cf'
    style: plain
    template: ╰─
text.2:
    foreground: '#d3d7cf'
    style: plain
    template: ─╯
time:
    background: '#d3d7cf'
    foreground: '#000000'
    invert_powerline: true
    leading_separator: ─╮
    style: diamond
    template: ' {{ .LastDate | date .Format }}  '
    trailing_separator: 
