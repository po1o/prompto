$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
final_space: true
git:
    foreground: p:lavender
    options:
        branch_icon: ' '
        cherry_pick_icon: ' '
        commit_icon: ' '
        fetch_status: false
        fetch_upstream_icon: false
        merge_icon: ' '
        no_commits_icon: ' '
        rebase_icon: ' '
        revert_icon: ' '
        tag_icon: ' '
    style: plain
    template: '{{ .HEAD }} '
os:
    foreground: p:os
    style: plain
    template: '{{.Icon}} '
palette:
    blue: '#1e66f5'
    closer: p:os
    lavender: '#7287FD'
    os: '#ACB0BE'
    pink: '#ea76cb'
path:
    foreground: p:pink
    options:
        folder_icon: ....
        home_icon: "~"
        style: agnoster_short
    style: plain
    template: '{{ .Path }} '
prompt:
    - segments:
        - os
        - session
        - path
        - git
        - text
session:
    foreground: p:blue
    style: plain
    template: '{{ .UserName }}@{{ .HostName }} '
text:
    foreground: p:closer
    style: plain
    template: 
version: 4
