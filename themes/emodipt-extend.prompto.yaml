executiontime:
    foreground: '#b8ff75'
    foreground_templates:
        - '{{ if gt .Code 0 }}#E06C75{{ end }}'
    options:
        always_enabled: true
        style: roundrock
    style: diamond
    template: ' {{ .FormattedMs }} '
cursor_padding: true
git:
    foreground: '#F3C267'
    foreground_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FF9248{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff4500{{ end }}'
        - '{{ if gt .Ahead 0 }}#B388FF{{ end }}'
        - '{{ if gt .Behind 0 }}#B388FF{{ end }}'
    options:
        branch_template: '{{ trunc 25 .Branch }}'
        fetch_status: true
        fetch_upstream_icon: true
    style: plain
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
path:
    foreground: '#61AFEF'
    options:
        style: full
    style: plain
    template:  {{ .Path }}
prompt:
    - segments:
        - time
        - shell
        - git
    - segments:
        - path
    - segments:
        - root
        - text
root:
    foreground: '#E06C75'
    style: plain
    template: '!'
rprompt:
    - segments:
        - status
        - executiontime
shell:
    foreground: '#E06C75'
    options:
        mapped_shell_names:
            bash: Bash
            cmd: Cmd
            powershell: Shell
            pwsh: Shell
    style: plain
    template: '  {{ .Name }}'
status:
    foreground: '#b8ff75'
    foreground_templates:
        - '{{ if gt .Code 0 }}#E06C75{{ end }}'
    style: plain
    template: ' x{{ reason .Code }}'
text:
    foreground: '#E06C75'
    style: plain
    template: ❯
time:
    foreground: '#E5C07B'
    options:
        time_format: "15:04"
    style: plain
    template: '[{{ .LastDate | date .Format }}]'
