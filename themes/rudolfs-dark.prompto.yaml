$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
git:
    background: '#256C9D'
    foreground: '#ffffff'
    options:
        branch_template: '{{ trunc 30 .Branch }}'
        fetch_status: true
        fetch_upstream_icon: true
    style: plain
    template: '[ {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} ]'
os:
    background: '#0A703E'
    foreground: '#ffffff'
    style: plain
    template: ' {{ .Icon }} '
path:
    background: '#256C9D'
    foreground: '#ffffff'
    options:
        folder_icon: 
        folder_separator_icon: '  '
        max_depth: 2
        style: agnoster_short
    style: plain
    template: ' {{ .Path }} '
prompt:
    - segments:
        - root
        - os
        - session
        - path
        - git
        - python
        - text
python:
    background: '#256C9D'
    foreground: '#ffffff'
    options:
        text: 
    powerline_symbol: 
    style: plain
    template: '  {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }} '
root:
    background: '#BF231D'
    foreground: '#ffffff'
    style: plain
    template: '  '
session:
    background: '#0A703E'
    foreground: '#ffffff'
    style: plain
    template: '{{ .UserName }} '
text:
    foreground: '#256C9D'
    style: plain
    template: ' '
version: 4
