$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
cursor_padding: true
git:
    foreground: '#D4AAFC'
    options:
        branch_icon: ""
    style: plain
    template: ' <#DDB15F>git(</>{{ .HEAD }}<#DDB15F>)</>'
path:
    foreground: '#56B6C2'
    options:
        style: folder
    style: plain
    template: ' {{ .Path }}'
prompt:
    - segments:
        - session
        - text
        - path
        - git
        - status
session:
    foreground: '#E36464'
    style: plain
    template: '@{{ .UserName }} '
status:
    foreground: '#DCB977'
    style: plain
    template: ' '
text:
    foreground: '#62ED8B'
    style: plain
    template: ➜
