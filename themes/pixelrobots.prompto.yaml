$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
aws:
    background: '#FFA400'
    foreground: '#000000'
    options:
        display_default: true
    powerline_symbol: юВ░
    style: powerline
    template: " \U000F0E0F {{.Profile}}{{if .Region}}@{{.Region}}{{end}}"
az:
    background: '#008AD7'
    foreground: '#000000'
    options:
        source: cli
    powerline_symbol: юВ░
    style: powerline
    template: ' юпШ {{ .Name }} [ {{ .Origin }} ] '
az.2:
    background: '#012456'
    foreground: '#FFFFFF'
    options:
        source: pwsh
    powerline_symbol: юВ░
    style: powerline
    template: ' юпШ {{ .Name }} [ {{ .Origin }} ] '
console_title_template: '{{if .Root}}root :: {{end}}{{.Shell}} :: {{.Folder}}'
final_space: true
git:
    background: '#2f2f2f'
    foreground: '#ffea00'
    foreground_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#ffea00{{ end }}'
        - '{{ if gt .Ahead 0 }}#2EC4B6{{ end }}'
        - '{{ if gt .Behind 0 }}#8A4FFF{{ end }}'
    options:
        fetch_status: true
        fetch_upstream_icon: true
    style: diamond
    template: '<#ffea00>юВ▒ </>{{ .UpstreamIcon }}{{ .HEAD }}{{ .BranchStatus }}{{ if .Working.Changed }}<#E84855> яБД {{ .Working.String }}</>{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}<#2FDA4E> яБЖ {{ .Staging.String }}</>{{ end }}{{ if gt .StashCount 0 }} юнЛ {{ .StashCount }}{{ end }} '
kubectl:
    background: '#ffea00'
    foreground: '#000000'
    style: powerline
    template: " \U000F10FE {{.Context}}{{if .Namespace}} :: {{.Namespace}}{{end}} "
os:
    background: '#2f2f2f'
    foreground: '#26C6DA'
    leading_separator: юГЗтЦУ
    options:
        alpine: яМА
        arch: яМГ
        centos: яМД
        debian: яМЖ
        elementary: яМЙ
        fedora: яМК
        gentoo: яМН
        linux: юЬТ
        macos: юЬС
        manjaro: яМТ
        mint: яМП
        opensuse: яМФ
        raspbian: яМХ
        ubuntu: яМЬ
        windows: юШк
    style: diamond
    template: ' {{ if .WSL }}{{ .Icon }} on юШк{{ end }} <#ffea00>юВ▒</>'
path:
    background: '#2f2f2f'
    foreground: '#fafafa'
    options:
        folder_icon: <#B5B2C2>юЧ╛ </>
        folder_separator_icon: <#ffea00>юВ▒ </>
        home_icon: ' яАХ '
        style: agnoster_short
    style: diamond
    template: '<#f2f200> юЧ┐ </>{{ .Path }} '
prompt:
    - segments:
        - text
        - kubectl
        - az
        - az.2
        - aws
    - segments:
        - os
        - session
        - root
        - path
        - git
        - text.2
    - segments:
        - text.3
root:
    background: '#2f2f2f'
    foreground: '#ffea00'
    style: diamond
    template: ' яГз<#ffea00> юВ▒</>'
session:
    background: '#2f2f2f'
    foreground: '#ffea00'
    style: diamond
    template: ' {{ if ne .Env.PROMPTO_SESSION_DEFAULT_USER .UserName }}{{ .UserName }}{{ end }}<#ffea00> юВ▒</>'
text:
    background: '#ffea00'
    foreground: '#000000'
    leading_separator: юГЗтЦУ
    style: diamond
text.2:
    background: '#2f2f2f'
    foreground: '#fafafa'
    style: diamond
    trailing_separator: юВ░
text.3:
    foreground: '#ffea00'
    style: plain
    template: ' тЭп '
version: 4
