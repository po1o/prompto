$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
console_title_template: '{{ .Folder }}'
executiontime:
    background: '#575656'
    foreground: '#d6deeb'
    leading_separator: 
    options:
        style: roundrock
        threshold: 0
    style: diamond
    template: ' {{ .FormattedMs }} '
    trailing_separator: 
git:
    background: '#17D7A0'
    foreground: '#011627'
    leading_separator: 
    options:
        branch_icon: ' '
        fetch_status: true
        fetch_upstream_icon: true
    style: diamond
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
    trailing_separator: 
node:
    background: '#ffffff'
    foreground: '#000000'
    leading_separator: 
    options:
        fetch_package_manager: true
        npm_icon: ' <#cc3a3a></> '
        yarn_icon: ' <#348cba></>'
    style: diamond
    template:  {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}
    trailing_separator: <transparent,#ffffff></>
os:
    background: '#FEF5ED'
    foreground: '#011627'
    leading_separator: 
    options:
        macos: ' '
        ubuntu: ' '
        windows: ' '
    style: diamond
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}}'
    trailing_separator: <transparent,#FEF5ED></>
path:
    foreground: '#ffafd2'
    options:
        folder_icon: 
        home_icon: home
        style: agnoster_full
    style: diamond
    template: '  {{ .Path }} '
prompt:
    - segments:
        - os
        - time
        - sysinfo
        - sysinfo.2
        - executiontime
    - segments:
        - path
        - status
rprompt:
    - segments:
        - node
        - git
status:
    foreground: '#00ff15'
    foreground_templates:
        - '{{ if gt .Code 0 }}#ff0000{{ end }}'
    options:
        always_enabled: true
    style: plain
    template: '  '
sysinfo:
    background: '#516BEB'
    foreground: '#ffffff'
    leading_separator: 
    style: diamond
    template: ' CPU: {{ round .PhysicalPercentUsed .Precision }}% | '
sysinfo.2:
    background: '#516BEB'
    foreground: '#ffffff'
    style: diamond
    template: 'RAM: {{ (div ((sub .PhysicalTotalMemory .PhysicalAvailableMemory)|float64) 1073741824.0) }}/{{ (div .PhysicalTotalMemory 1073741824.0) }}GB  '
    trailing_separator: <transparent,#516BEB></>
time:
    background: '#FEF5ED'
    foreground: '#011627'
    leading_separator: 
    options:
        time_format: "15:04:05"
    style: diamond
    template: ' ♥ {{ .LastDate | date .Format }} '
    trailing_separator: <transparent,#FEF5ED></>
transient:
    - segments:
        - text.transient
text.transient:
    background: transparent
    foreground: '#FEF5ED'
    template: ' '
