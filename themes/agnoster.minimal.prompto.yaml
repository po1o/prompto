git:
    background: '#007ACC'
    foreground: '#ffffff'
    options:
        cherry_pick_icon: '✓ '
        commit_icon: '▷ '
        fetch_status: true
        merge_icon: '◴ '
        no_commits_icon: '[no commits]'
        rebase_icon: 'Ɫ '
        tag_icon: '▶ '
    style: plain
    template: '{{ .HEAD }}{{ if and (eq .Ahead 0) (eq .Behind 0) }} ≡{{end}}{{ if gt .Ahead 0 }} ↑{{.Ahead}}{{end}}{{ if gt .Behind 0 }} ↓{{.Behind}}{{end}} {{ if .Working.Changed }}+{{ .Working.Added }} ~{{ .Working.Modified }} -{{ .Working.Deleted }} {{ end }}'
path:
    background: '#007ACC'
    foreground: '#ffffff'
    options:
        folder_icon: …
        folder_separator_icon: '  '
        max_depth: 3
        style: agnoster_short
    style: plain
    template: '<transparent></> {{ .Path }} '
prompt:
    - segments:
        - status
        - root
        - session
        - path
        - git
        - text
root:
    foreground: '#ff0000'
    style: plain
    template: '# '
session:
    foreground: '#ffffff'
    style: plain
    template: '{{ .UserName }}@{{ .HostName }} '
status:
    foreground: '#ffffff'
    style: plain
    template: '{{ reason .Code }}❌ '
text:
    foreground: '#007ACC'
    style: plain
    template: ' '
