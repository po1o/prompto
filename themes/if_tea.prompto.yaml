console_title_template: '{{ .Folder }}'
executiontime:
    background: '#2343e2'
    foreground: '#ffffff'
    leading_separator: оӮІ
    options:
        style: roundrock
        threshold: 0
    style: diamond
    template: ' {{ .FormattedMs }} '
    trailing_separator: оӮ°
git:
    background: '#ee79d1'
    foreground: '#000000'
    leading_separator: оғӮ
    options:
        branch_icon: 'оңҘ '
        fetch_status: true
        fetch_upstream_icon: true
    style: diamond
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} пҒ„ {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} пҒҶ {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} оӯӢ {{ .StashCount }}{{ end }} '
    trailing_separator: оӮ°
os:
    foreground: '#1865f5'
    options:
        alpine: пҢҖ
        arch: пҢғ
        centos: пҢ„
        debian: пҢҶ
        elementary: пҢү
        fedora: пҢҠ
        gentoo: пҢҚ
        linux: оң’
        macos: 'п…№ '
        manjaro: пҢ’
        mint: пҢҸ
        opensuse: пҢ”
        raspbian: пҢ•
        ubuntu: 'пҢӣ '
        windows: 'оҳӘ '
    style: diamond
    template: ' {{ if .WSL }}WSL at {{ end }}{{.Icon}}'
    trailing_separator: <transparent,>оӮІ</>
path:
    background: '#f8677b'
    foreground: '#000000'
    leading_separator: <transparent,#F8677b>оӮ°</>
    options:
        folder_icon: 'пҒ» '
        folder_separator_icon: ' пҒЎ '
        home_icon: п‘ӯ
        style: agnoster_full
    style: diamond
    template: ' о—ҝ {{ .Path }} '
    trailing_separator: оғҖ
prompt:
    - segments:
        - os
        - sysinfo
        - sysinfo.2
        - executiontime
    - segments:
        - text
        - shell
        - time
        - root
        - path
    - segments:
        - status
root:
    options:
        root_icon: 'пҠ’ '
    style: diamond
    template: ' пғ§ '
rprompt:
    - segments:
        - git
shell:
    background: '#91f2ff'
    foreground: '#000000'
    leading_separator: оӮІ
    style: diamond
    template: ' п’ү {{ .Name }} '
    trailing_separator: <transparent,#91f2ff>оӮІ</>
status:
    foreground: '#00BCF9'
    foreground_templates:
        - '{{ if gt .Code 0 }}#ef5350{{ end }}'
    options:
        always_enabled: true
    style: plain
    template: 'в•°в”ҖоҠ…п„…пҶ—  '
sysinfo:
    background: '#00c7fc'
    foreground: '#000000'
    leading_separator: <transparent,#00c7fc>оӮ°</>
    style: diamond
    template: ' оүҰ CPU: {{ round .PhysicalPercentUsed .Precision }}% | '
sysinfo.2:
    background: '#00c7fc'
    foreground: '#000000'
    style: diamond
    template: 'RAM: {{ (div ((sub .PhysicalTotalMemory .PhysicalAvailableMemory)|float64) 1073741824.0) }}/{{ (div .PhysicalTotalMemory 1073741824.0) }}GB оүҰ '
    trailing_separator: <transparent,#00c7fc>оӮІ</>
text:
    foreground: '#91f2ff'
    style: plain
    template: в•ӯв”Җ
time:
    background: '#ff8c94'
    foreground: '#000000'
    leading_separator: оӮІ
    options:
        time_format: 3:04:05 PM | Monday
    style: diamond
    template: ' оҷҒ {{ .LastDate | date .Format }} пҒі '
    trailing_separator: оӮ°
transient:
    - segments:
        - text.transient
text.transient:
    background: transparent
    foreground: '#FEF5ED'
    template: 'оҠ… '
