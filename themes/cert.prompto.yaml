cursor_padding: true
git:
    background: lightCyan
    foreground: '#fff'
    leading_separator: 
    options:
        branch_icon: ""
    style: diamond
    template: ' git({{ .HEAD }}) '
    trailing_separator: 
path:
    background: green
    foreground: '#fff'
    leading_separator: 
    options:
        style: folder
    style: diamond
    template: ' {{ .Path }} '
    trailing_separator: 
prompt:
    - segments:
        - session
        - path
        - git
        - time
session:
    background: '#E36464'
    foreground: '#fff'
    leading_separator: 
    style: diamond
    template: '{{ .UserName }} '
    trailing_separator: 
time:
    background: lightMagenta
    foreground: '#fff'
    leading_separator: 
    options:
        time_format: "15:04"
    style: diamond
    template: ' {{ .LastDate | date .Format }} '
    trailing_separator: 
