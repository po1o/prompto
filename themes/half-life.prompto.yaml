$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
git:
    foreground: '#5FD7FF'
    options:
        branch_ahead_icon: ""
        branch_behind_icon: ""
        branch_gone_icon: ""
        branch_icon: ""
        branch_identical_icon: ""
        cherry_pick_icon: ""
        commit_icon: ""
        fetch_status: true
        merge_icon: ""
        rebase_icon: ""
        revert_icon: ""
        tag_icon: ""
    style: plain
    template: '<#ffffff>on</> {{ .HEAD }}{{ if .Staging.Changed }}<#87FF00> ● {{ .Staging.String }}</>{{ end }}{{ if .Working.Changed }}<#D75F00> ● {{ .Working.String }}</>{{ end }} '
path:
    foreground: '#87FF00'
    options:
        style: full
    style: plain
    template: '{{ .Path }} '
prompt:
    - segments:
        - session
        - text
        - path
        - git
        - text.2
session:
    foreground: '#7E46B6'
    style: plain
    template: '{{ .UserName }} '
text:
    foreground: '#ffffff'
    style: plain
    template: 'in '
text.2:
    foreground: '#D75F00'
    style: plain
    template: 'λ '
version: 4
