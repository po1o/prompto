$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
console_title_template: '{{ .Folder }}'
git:
    background: '#c19c00'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FFEB3B{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#FFA300{{ end }}'
        - '{{ if gt .Ahead 0 }}#FF7070{{ end }}'
        - '{{ if gt .Behind 0 }}#90F090{{ end }}'
    foreground: '#000000'
    options:
        fetch_status: true
        fetch_upstream_icon: true
    powerline_symbol: 
    style: powerline
    template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
path:
    background: '#0080ff'
    foreground: '#ffffff'
    options:
        style: full
    powerline_symbol: 
    style: powerline
    template: '  {{ .Path }} '
prompt:
    - segments:
        - session
        - path
        - git
        - status
    - segments:
        - root
        - shell
        - text
root:
    foreground: '#ff0000'
    style: plain
    template: ' '
rprompt:
    - segments:
        - time
session:
    background: '#2e9599'
    foreground: '#ffffff'
    leading_separator: 
    powerline_symbol: 
    style: diamond
    template: '{{ if .SSHSession }}{{ else }}{{ end }} {{ .UserName }}@{{ .HostName }}'
shell:
    foreground: '#ffffff'
    style: plain
    template: ' {{ .Name }} '
status:
    background: '#2e9599'
    background_templates:
        - '{{ if gt .Code 0 }}#f1184c{{ end }}'
    foreground: '#ffffff'
    options:
        always_enabled: true
    style: diamond
    template: '  '
    trailing_separator: 
text:
    foreground: '#ffffff'
    style: plain
    template: ' '
time:
    background: '#2e9599'
    foreground: '#ffffff'
    leading_separator: 
    options:
        time_format: "15:04:05"
    style: diamond
    template: ' {{ .CurrentDate | date .Format }} '
    trailing_separator: 
version: 4
