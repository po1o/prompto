$schema: https://raw.githubusercontent.com/JanDeDobbeleer/prompto/main/themes/schema.json
git:
    background: '#FFFB38'
    background_templates:
        - '{{ if or (.Working.Changed) (.Staging.Changed) }}#ffeb95{{ end }}'
        - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#c5e478{{ end }}'
        - '{{ if gt .Ahead 0 }}#C792EA{{ end }}'
        - '{{ if gt .Behind 0 }}#C792EA{{ end }}'
    foreground: '#011627'
    options:
        branch_icon: ' '
        fetch_status: true
        fetch_upstream_icon: true
    powerline_symbol: 
    style: powerline
    template: ' {{ .HEAD }} {{ if .Working.Changed }}{{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}<#ef5350>  {{ .Staging.String }}</>{{ end }} '
node:
    background: '#303030'
    foreground: '#3C873A'
    leading_separator: ' '
    options:
        fetch_package_manager: true
        npm_icon: ' <#cc3a3a></> '
        yarn_icon: ' <#348cba></>'
    style: diamond
    template:  {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}
    trailing_separator: 
path:
    background: '#444444'
    foreground: '#E4E4E4'
    options:
        style: full
    powerline_symbol: 
    style: powerline
    template: ' {{ .Path }} '
prompt:
    - segments:
        - shell
        - root
        - path
        - git
    - segments:
        - text
        - status
root:
    background: '#ef5350'
    foreground: '#FFFB38'
    options:
        root_icon: 
    style: diamond
    template: '<parentBackground></>  '
rprompt:
    - segments:
        - node
        - time
shell:
    background: '#0077c2'
    foreground: '#ffffff'
    leading_separator: ╭─
    style: diamond
    template: ' {{ .Name }} '
status:
    foreground: '#e0f8ff'
    foreground_templates:
        - '{{ if gt .Code 0 }}#ef5350{{ end }}'
    options:
        always_enabled: true
    style: plain
    template: '❯ '
text:
    foreground: '#21c7c7'
    style: plain
    template: ╰─
time:
    background: '#40c4ff'
    foreground: '#ffffff'
    invert_powerline: true
    leading_separator: ' '
    style: diamond
    template: '  {{ .CurrentDate | date .Format }} '
    trailing_separator: 
